services:
  iptaula:
    build:
      context: .
      args:
        HTTP_PROXY: ${http_proxy:-}
        HTTPS_PROXY: ${https_proxy:-}
        NO_PROXY: ${no_proxy:-}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      - DB_PATH=/data/iptaula.db
    restart: unless-stopped
