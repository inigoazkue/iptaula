<!doctype html>
<html lang="eu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IP Taula</title>
<style>
  :root {
    color-scheme: light;
    --page:           #f6f5fb;
    --surface-1:      #ffffff;
    --text-primary:   #26243a;
    --text-secondary: #5c5975;
    --text-muted:     #8f8ca6;
    --gridline:       #e7e4f2;
    --border:         rgba(38,36,58,0.10);
    --shadow:         0 1px 3px rgba(38,36,58,0.08);

    --rango-bg:    #eaf2fd;
    --rango-border:#cfe2fa;
    --group-bg:    #fdf1e4;
    --group-border:#f3ddc0;

    --btn-blue:     #b7d3f7; --btn-blue-hover: #9cc0f2; --btn-blue-ink: #1d3f66;
    --btn-green:    #c8ecd3; --btn-green-hover: #aee0bd; --btn-green-ink: #205a34;
    --btn-pink:     #f8ccd2; --btn-pink-hover: #f3aeb8; --btn-pink-ink: #6e2430;
    --btn-neutral:  #eceafc; --btn-neutral-hover: #ddd9f7; --btn-neutral-ink: #33314a;

    --row-free: #eaf7ec;
    --row-used: #fdf0e0;
    --search-match: #fff2a8;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --page: #17161f; --surface-1: #211f2c;
      --text-primary: #f1f0f8; --text-secondary: #c2bfd6; --text-muted: #8f8ca6;
      --gridline: #322f42; --border: rgba(255,255,255,0.10);
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
      --rango-bg: #1e2c3f; --rango-border: #2c4562;
      --group-bg: #362c1f; --group-border: #56412a;
      --btn-blue: #2c4562; --btn-blue-hover: #395a80; --btn-blue-ink: #cfe2fa;
      --btn-green: #23402c; --btn-green-hover: #2d5238; --btn-green-ink: #c8ecd3;
      --btn-pink: #4a2830; --btn-pink-hover: #5e323c; --btn-pink-ink: #f8ccd2;
      --btn-neutral: #2b2940; --btn-neutral-hover: #383552; --btn-neutral-ink: #eceafc;
      --row-free: #1d3320; --row-used: #3a2c18; --search-match: #4a4420;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --page: #17161f; --surface-1: #211f2c;
    --text-primary: #f1f0f8; --text-secondary: #c2bfd6; --text-muted: #8f8ca6;
    --gridline: #322f42; --border: rgba(255,255,255,0.10);
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --rango-bg: #1e2c3f; --rango-border: #2c4562;
    --group-bg: #362c1f; --group-border: #56412a;
    --btn-blue: #2c4562; --btn-blue-hover: #395a80; --btn-blue-ink: #cfe2fa;
    --btn-green: #23402c; --btn-green-hover: #2d5238; --btn-green-ink: #c8ecd3;
    --btn-pink: #4a2830; --btn-pink-hover: #5e323c; --btn-pink-ink: #f8ccd2;
    --btn-neutral: #2b2940; --btn-neutral-hover: #383552; --btn-neutral-ink: #eceafc;
    --row-free: #1d3320; --row-used: #3a2c18; --search-match: #4a4420;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: var(--page); color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }
  .subtitle { color: var(--text-secondary); margin: 0 0 16px; font-size: 0.9rem; }

  .topbar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  button, .btn {
    font-family: inherit; cursor: pointer; border: none; border-radius: 8px;
    padding: 6px 12px; font-size: 0.78rem; font-weight: 600;
    transition: background-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
  }
  button:hover, .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-blue    { background: var(--btn-blue); color: var(--btn-blue-ink); }
  .btn-blue:hover    { background: var(--btn-blue-hover); }
  .btn-green   { background: var(--btn-green); color: var(--btn-green-ink); }
  .btn-green:hover   { background: var(--btn-green-hover); }
  .btn-pink    { background: var(--btn-pink); color: var(--btn-pink-ink); }
  .btn-pink:hover    { background: var(--btn-pink-hover); }
  .btn-neutral { background: var(--btn-neutral); color: var(--btn-neutral-ink); }
  .btn-neutral:hover { background: var(--btn-neutral-hover); }
  .btn-text {
    background: none; color: var(--text-secondary); padding: 2px 4px; font-weight: 500;
    text-decoration: underline; text-decoration-color: transparent;
  }
  .btn-text:hover { color: var(--btn-blue-ink); text-decoration-color: currentColor; transform: none; box-shadow: none; }

  #dark-toggle-btn { display: flex; align-items: center; justify-content: center; padding: 6px 9px; }
  #dark-toggle-btn svg { width: 16px; height: 16px; display: block; }

  #settings-btn {
    position: fixed; bottom: 22px; right: 22px; width: 46px; height: 46px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(38,36,58,0.22); z-index: 50;
  }
  #settings-btn svg { width: 22px; height: 22px; display: block; }
  #settings-menu {
    position: fixed; bottom: 78px; right: 22px; z-index: 51;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.2); padding: 6px; min-width: 190px;
    display: none; flex-direction: column; gap: 2px;
  }
  #settings-menu.open { display: flex; }
  #settings-menu button {
    background: none; color: var(--text-primary); text-align: left; font-weight: 500;
    padding: 8px 10px; border-radius: 6px; width: 100%;
  }
  #settings-menu button:hover { background: var(--btn-neutral-hover); transform: none; box-shadow: none; }

  #version-badge {
    position: fixed; bottom: 22px; left: 22px; z-index: 50;
    background: var(--surface-1); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 5px 13px; font-size: 0.72rem; box-shadow: var(--shadow);
  }

  .search-row { margin-bottom: 14px; }
  #search-box {
    padding: 7px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface-1); color: var(--text-primary); font-size: 0.82rem; width: 280px; max-width: 100%;
  }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td {
    border: 1px solid var(--gridline); vertical-align: top;
    padding: 10px; font-size: 0.85rem;
  }
  th {
    background: var(--surface-1); color: var(--text-secondary);
    font-weight: 700; text-align: left;
  }
  th:first-child { width: 130px; }

  .cell-actions {
    display: flex; gap: 8px; margin-bottom: 8px; min-height: 1px;
    opacity: 0; pointer-events: none; transition: opacity 150ms ease;
  }
  td:hover > .cell-actions, td:hover .cell-actions { opacity: 1; pointer-events: auto; }

  .node {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px; margin-bottom: 8px; background: var(--surface-1);
    box-shadow: var(--shadow); cursor: pointer;
  }
  .node.rango { background: var(--rango-bg); border-color: var(--rango-border); }
  .node.agrupacion { background: var(--group-bg); border-color: var(--group-border); border-style: dashed; }
  .node.search-match { outline: 3px solid var(--search-match); outline-offset: 1px; }
  .node.dragging { opacity: 0.35; }
  .node.drop-target { outline: 2px dashed var(--link); outline-offset: 2px; }
  td.drop-target { outline: 2px dashed var(--link); outline-offset: -2px; }
  .node-children.drop-target { outline: 2px dashed var(--link); outline-offset: -2px; border-radius: 6px; }
  .node-head { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
  .node-name { font-weight: 700; font-size: 0.88rem; }
  .node-desc { color: var(--text-secondary); font-size: 0.76rem; display: block; margin-top: 2px; }
  .node-cidr { color: var(--text-secondary); font-size: 0.78rem; font-family: ui-monospace, monospace; margin-top: 3px; }
  .node-cols { color: var(--text-muted); font-size: 0.74rem; display: block; margin-top: 2px; }
  .node-ctrl { display: flex; gap: 8px; white-space: nowrap; }

  .mini-ip-table { width: 100%; border-collapse: collapse; margin-top: 6px; }
  .mini-ip-table th, .mini-ip-table td {
    font-size: 0.68rem; padding: 2px 5px; text-align: left;
    border: none; border-bottom: 1px solid var(--gridline);
    font-family: ui-monospace, monospace; background: none;
  }
  .mini-ip-table th { font-family: system-ui, sans-serif; color: var(--text-muted); font-weight: 600; }
  .mini-ip-table tr:last-child td { border-bottom: none; }
  .mini-ip-table tr.ip-row-search-match td { background: var(--search-match); }
  .mini-ip-more { font-size: 0.68rem; color: var(--text-muted); display: block; margin-top: 4px; }

  .node-children { margin: 8px 0 2px 14px; padding-left: 10px; border-left: 2px solid var(--gridline); cursor: default; }
  .node-add-row {
    display: flex; gap: 8px; margin-top: 6px; padding: 4px;
    opacity: 0; pointer-events: none; transition: opacity 150ms ease;
  }
  .node-children:hover .node-add-row { opacity: 1; pointer-events: auto; }

  form.inline-form {
    display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0;
    padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-1);
  }
  form.inline-form input {
    font-size: 0.78rem; padding: 5px 7px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--page); color: var(--text-primary);
  }
  form.inline-form input[name="name"] { flex: 1; min-width: 100px; }
  form.inline-form input[name="cidr"] { width: 130px; }
  form.inline-form input[name="description"] { flex: 2; min-width: 120px; }
  .form-error { color: #c23b4a; font-size: 0.72rem; width: 100%; }

  /* --- modal --- */
  dialog {
    border: none; border-radius: 14px; padding: 0; width: min(720px, 92vw);
    background: var(--surface-1); color: var(--text-primary); box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  dialog::backdrop { background: rgba(20,18,30,0.45); }
  .modal-inner { padding: 20px 22px; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header h2 { font-size: 1.15rem; margin: 0; }
  .modal-section { margin-bottom: 18px; }
  .modal-section h3 { font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }

  .col-chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem;
    background: var(--btn-neutral); color: var(--btn-neutral-ink); padding: 3px 8px;
    border-radius: 10px; margin: 0 6px 6px 0;
  }
  .col-chip button { background: none; padding: 0; color: inherit; font-weight: 700; }

  table.ip-table th, table.ip-table td { font-size: 0.78rem; padding: 6px 8px; }
  table.ip-table input { width: 100%; font-size: 0.78rem; padding: 4px 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-1); color: var(--text-primary); }
  table.ip-table tr.ip-row-free  { background: var(--row-free); }
  table.ip-table tr.ip-row-used  { background: var(--row-used); }

  .catalog-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--gridline); font-size: 0.85rem; }
  .catalog-row:last-child { border-bottom: none; }

  /* --- modales de autenticación: más verticales/estrechos --- */
  #login-modal, #password-modal { width: min(320px, 90vw); }
  #login-modal .modal-header, #password-modal .modal-header { justify-content: center; position: relative; margin-bottom: 20px; }
  #login-modal .modal-header .btn-neutral, #password-modal .modal-header .btn-neutral {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%); padding: 4px 9px;
  }
  #login-modal h2, #password-modal h2 { font-size: 1.05rem; }
  .auth-form { display: flex; flex-direction: column; gap: 12px; padding: 4px 2px 2px; }
  .auth-form input { width: 100%; padding: 10px 12px; font-size: 0.85rem; }
  .auth-form button[type="submit"] { padding: 10px; font-size: 0.85rem; margin-top: 4px; }

  #status { color: var(--text-muted); font-size: 0.85rem; }
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>IP Taula</h1>
    <p class="subtitle">Egoitzen eta sare moten araberako sare-taula.</p>
  </div>
  <div class="topbar-right">
    <button class="btn-neutral" id="dark-toggle-btn" title="Modua aldatu"></button>
    <div id="auth-area"></div>
  </div>
</div>

<div class="search-row">
  <input type="text" id="search-box" placeholder="Bilatu IP, izena, hostname...">
</div>

<div id="status">Kargatzen...</div>
<table id="grid" style="display:none;"></table>

<div id="version-badge">v1.0.0</div>

<button id="settings-btn" class="btn-neutral" style="display:none;" title="Ezarpenak">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>
<div id="settings-menu"></div>

<dialog id="range-modal"><div class="modal-inner" id="range-modal-body"></div></dialog>
<dialog id="columns-modal"><div class="modal-inner" id="columns-modal-body"></div></dialog>
<dialog id="matrix-modal"><div class="modal-inner" id="matrix-modal-body"></div></dialog>
<dialog id="users-modal"><div class="modal-inner" id="users-modal-body"></div></dialog>
<dialog id="login-modal"><div class="modal-inner" id="login-modal-body"></div></dialog>
<dialog id="password-modal"><div class="modal-inner" id="password-modal-body"></div></dialog>

<script>
let SITES = [];
let ROLES = [];
let TREE = null;
let COLUMNS = [];
let isAuthenticated = false;
let currentUsername = null;
let currentRole = null;
function isAdmin() { return isAuthenticated && currentRole === 'admin'; }
const expandedGroups = new Set(); // agrupazio zabalduen idak, errenderizazioen artean irauten du
let currentSearch = {matchedNodeIds: new Set(), expandIds: new Set(), ipMatches: new Map()};

const SUN_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>`;
const MOON_ICON = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>`;

async function api(path, opts) {
  const resp = await fetch(`/api${path}`, {headers: {'Content-Type': 'application/json'}, ...opts});
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.detail || `HTTP ${resp.status}`);
  }
  return resp.status === 204 ? null : resp.json();
}

async function loadAll() {
  const [treeResp, cols, sess] = await Promise.all([api('/tree'), api('/columns'), api('/session')]);
  SITES = treeResp.sites.map(s => ({slug: s.slug, label: s.name, id: s.id}));
  ROLES = treeResp.roles.map(r => ({slug: r.slug, label: r.name, id: r.id}));
  TREE = treeResp.tree;
  COLUMNS = cols;
  isAuthenticated = sess.authenticated;
  currentUsername = sess.username || null;
  currentRole = sess.role || null;
}

async function refresh() {
  await loadAll();
  renderGrid();
  renderAuthUI();
  renderSettingsButton();
}

function escapeAttr(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}
function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
}

/* ---------- modu iluna/argia ---------- */

function systemPrefersDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function isEffectivelyDark() {
  const current = document.documentElement.getAttribute('data-theme');
  return current === 'dark' || (!current && systemPrefersDark());
}
function updateThemeButtonIcon() {
  // modu ilunean eguzkia erakusten da (argira aldatzeko gonbita), eta alderantziz
  document.getElementById('dark-toggle-btn').innerHTML = isEffectivelyDark() ? SUN_ICON : MOON_ICON;
}
function initTheme() {
  const saved = localStorage.getItem('iptaula-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeButtonIcon();
}
document.getElementById('dark-toggle-btn').addEventListener('click', () => {
  const next = isEffectivelyDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('iptaula-theme', next);
  updateThemeButtonIcon();
});
initTheme();

/* ---------- autentifikazioa (saioa hasi/itxi, pasahitza aldatu) ---------- */

function renderAuthUI() {
  const authArea = document.getElementById('auth-area');
  if (isAuthenticated) {
    authArea.innerHTML = `
      <span style="font-size:0.78rem; color:var(--text-secondary); margin-right:2px;">${escapeHtml(currentUsername)}</span>
      <button class="btn-neutral" id="logout-btn">Itxi saioa</button>
    `;
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('/logout', {method: 'POST'});
      await refresh();
    });
  } else {
    authArea.innerHTML = `<button class="btn-blue" id="login-btn">Hasi saioa</button>`;
    document.getElementById('login-btn').addEventListener('click', () => openLoginModal());
  }
}

/* ---------- ezarpen-botoia (engranajea) eta bere menua ---------- */

function renderSettingsButton() {
  const btn = document.getElementById('settings-btn');
  btn.style.display = isAuthenticated ? 'flex' : 'none';
  if (!isAuthenticated) closeSettingsMenu();
}

function closeSettingsMenu() {
  document.getElementById('settings-menu').classList.remove('open');
}

function renderSettingsMenu() {
  const menu = document.getElementById('settings-menu');
  const items = [];
  if (isAdmin()) {
    items.push({label: 'Matrizea kudeatu', action: () => openMatrixModal()});
    items.push({label: 'Zutabeak kudeatu', action: () => openColumnsModal()});
    items.push({label: 'Erabiltzaileak kudeatu', action: () => openUsersModal()});
  }
  items.push({label: 'Pasahitza aldatu', action: () => openPasswordModal()});

  menu.innerHTML = items.map((it, i) => `<button data-i="${i}">${it.label}</button>`).join('');
  menu.querySelectorAll('button').forEach((el, i) => {
    el.addEventListener('click', () => { closeSettingsMenu(); items[i].action(); });
  });
}

document.getElementById('settings-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const menu = document.getElementById('settings-menu');
  if (menu.classList.contains('open')) { closeSettingsMenu(); return; }
  renderSettingsMenu();
  menu.classList.add('open');
});
document.addEventListener('click', (e) => {
  const menu = document.getElementById('settings-menu');
  if (menu.classList.contains('open') && !menu.contains(e.target) && e.target.id !== 'settings-btn') {
    closeSettingsMenu();
  }
});

function openLoginModal() {
  const body = document.getElementById('login-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Hasi saioa</h2>
      <button class="btn-neutral" id="close-login-modal">Itxi</button>
    </div>
    <form class="auth-form" id="login-form">
      <input name="username" placeholder="Erabiltzailea" required>
      <input name="password" type="password" placeholder="Pasahitza" required>
      <button type="submit" class="btn-blue">Sartu</button>
    </form>
    <div class="form-error" id="login-error"></div>
  `;
  document.getElementById('close-login-modal').addEventListener('click', () => document.getElementById('login-modal').close());
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('login-error').textContent = '';
    try {
      await api('/login', {method: 'POST', body: JSON.stringify({
        username: e.target.username.value, password: e.target.password.value,
      })});
      document.getElementById('login-modal').close();
      await refresh();
    } catch (err) {
      document.getElementById('login-error').textContent = err.message;
    }
  });
  document.getElementById('login-modal').showModal();
}

function openPasswordModal() {
  const body = document.getElementById('password-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Pasahitza aldatu</h2>
      <button class="btn-neutral" id="close-password-modal">Itxi</button>
    </div>
    <form class="auth-form" id="password-form">
      <input name="current" type="password" placeholder="Uneko pasahitza" required>
      <input name="next" type="password" placeholder="Pasahitza berria" required>
      <button type="submit" class="btn-blue">Gorde</button>
    </form>
    <div class="form-error" id="password-error"></div>
  `;

/* ---------- bilaketa ---------- */

function computeSearch(query) {
  const q = query.trim().toLowerCase();
  const result = {matchedNodeIds: new Set(), expandIds: new Set(), ipMatches: new Map()};
  if (!q) return result;

  function visit(node, ancestors) {
    let selfMatch = node.name.toLowerCase().includes(q) || (node.description || '').toLowerCase().includes(q);
    if (node.node_type === 'rango') {
      if ((node.cidr || '').toLowerCase().includes(q)) selfMatch = true;
      const matchedIps = new Set();
      (node.ip_entries || []).forEach(e => {
        let ipMatch = e.ip.toLowerCase().includes(q);
        if (!ipMatch) {
          for (const val of Object.values(e.values)) {
            if (val && val.toLowerCase().includes(q)) { ipMatch = true; break; }
          }
        }
        if (ipMatch) matchedIps.add(e.ip);
      });
      if (matchedIps.size) {
        result.ipMatches.set(node.id, matchedIps);
        selfMatch = true;
      }
    }
    if (selfMatch) {
      result.matchedNodeIds.add(node.id);
      ancestors.forEach(a => result.expandIds.add(a));
    }
    if (node.node_type === 'agrupacion') {
      const childAncestors = [...ancestors, node.id];
      node.children.forEach(c => visit(c, childAncestors));
    }
  }

  for (const site of SITES) for (const role of ROLES) {
    (TREE[site.slug][role.slug] || []).forEach(n => visit(n, []));
  }
  return result;
}

let searchDebounce;
document.getElementById('search-box').addEventListener('input', (e) => {

  const query = e.target.value;
  searchDebounce = setTimeout(() => {

    renderGrid();
  }, 200);
});

/* ---------- nodoen alta/edizio formularioak ---------- */

function addButtons(parentId, site, role, onDone) {
  const wrap = document.createElement('div');
  wrap.className = 'cell-actions';
  if (!isAdmin()) return wrap;
  const addRango = document.createElement('button');
  addRango.className = 'btn-blue'; addRango.textContent = '+ tartea';
  const addGroup = document.createElement('button');
  addGroup.className = 'btn-neutral'; addGroup.textContent = '+ taldea';
  wrap.append(addRango, addGroup);
  addRango.addEventListener('click', () => wrap.replaceWith(buildForm('rango', parentId, site, role, onDone, () => wrap)));
  addGroup.addEventListener('click', () => wrap.replaceWith(buildForm('agrupacion', parentId, site, role, onDone, () => wrap)));
  return wrap;
}

function buildForm(nodeType, parentId, site, role, onDone, getOriginal) {
  const form = document.createElement('form');
  form.className = 'inline-form';
  form.innerHTML = `
    <input name="name" placeholder="Izena" required>
    ${nodeType === 'rango' ? '<input name="cidr" placeholder="10.1.2.0/24" required>' : ''}
    <input name="description" placeholder="Deskribapena (aukerakoa)">

    <button type="button" class="btn-neutral cancel">Utzi</button>
  `;
  form.querySelector('.cancel').addEventListener('click', () => form.replaceWith(getOriginal()));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    form.querySelectorAll('.form-error').forEach(el => el.remove());
    try {
      await api('/nodes', {
        method: 'POST',
        body: JSON.stringify({
          parent_id: parentId,
          site: parentId === null ? site : undefined,
          role: parentId === null ? role : undefined,
          node_type: nodeType,
          name: form.name.value,
          description: form.description.value || null,
          cidr: nodeType === 'rango' ? form.cidr.value : null,
        }),
      });
      await onDone();
    } catch (err) {
      const p = document.createElement('div');
      p.className = 'form-error'; p.textContent = err.message;
      form.appendChild(p);
    }

}

function buildEditForm(node, onDone) {
  const form = document.createElement('form');
  form.className = 'inline-form';
  form.innerHTML = `
    <input name="name" value="${escapeAttr(node.name)}" required>
    <input name="description" value="${escapeAttr(node.description || '')}" placeholder="Deskribapena (aukerakoa)">
    <button type="submit" class="btn-blue">Gorde</button>
    <button type="button" class="btn-neutral cancel">Utzi</button>
  `;
  form.querySelector('.cancel').addEventListener('click', () => onDone(false));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    form.querySelectorAll('.form-error').forEach(el => el.remove());
    try {
      await api(`/nodes/${node.id}`, {
        method: 'PATCH',
        body: JSON.stringify({name: form.name.value, description: form.description.value || null}),
      });
      await onDone(true);
    } catch (err) {
      const p = document.createElement('div');
      p.className = 'form-error'; p.textContent = err.message;
      form.appendChild(p);
    }
  });
  return form;
}

function collectDescendantIds(node) {
  const acc = new Set();
  function walk(n) { n.children.forEach(c => { acc.add(c.id); walk(c); }); }
  walk(node);
  return acc;
}

// ---- arrastrar y soltar ----
// estado global mínimo del arrastre en curso (más simple y fiable entre
// navegadores que depender de dataTransfer.getData durante el dragover)
let draggingNode = null;

async function performMove(payload, onError) {
  try {
    await api(`/nodes/${draggingNode.id}/move`, {method: 'POST', body: JSON.stringify(payload)});
    await refresh();
  } catch (err) {
    if (onError) onError(err); else alert(err.message);
  }
}

function countDescendants(node) {
  return node.children.reduce((acc, c) => acc + 1 + countDescendants(c), 0);
}

async function deleteNode(node) {
  const n = countDescendants(node);
  const msg = n > 0 ? `"${node.name}" barruan ${n} elementu daude. Denak ezabatu?` : `"${node.name}" ezabatu?`;
  if (!confirm(msg)) return;
  await api(`/nodes/${node.id}`, {method: 'DELETE'});
  await refresh();
}

/* ---------- matrizeko nodo-txartela ---------- */

function renderNode(node, site, role) {
  const el = document.createElement('div');
  const isSearchMatch = currentSearch.matchedNodeIds.has(node.id);
  el.className = `node ${node.node_type}${isSearchMatch ? ' search-match' : ''}`;

  const body = document.createElement('div');
  const cols = node.columns || [];
  const entries = node.ip_entries || [];
  const matchedIps = currentSearch.ipMatches.get(node.id);
  const MAX_PREVIEW_ROWS = 6;

  let ipPreview = '';
  if (node.node_type === 'rango' && entries.length) {
    let ordered = entries;
    if (matchedIps && matchedIps.size) {
      ordered = [...entries].sort((a, b) => (matchedIps.has(b.ip) ? 1 : 0) - (matchedIps.has(a.ip) ? 1 : 0));
    }
    const shown = ordered.slice(0, MAX_PREVIEW_ROWS);
    ipPreview = `
      <table class="mini-ip-table">
        <tr><th>IP</th>${cols.map(c => `<th>${escapeHtml(c.name)}</th>`).join('')}</tr>
        ${shown.map(e => `<tr class="${matchedIps && matchedIps.has(e.ip) ? 'ip-row-search-match' : ''}"><td>${e.ip}</td>${cols.map(c => `<td>${escapeHtml(e.values[String(c.id)] || '')}</td>`).join('')}</tr>`).join('')}
      </table>
      ${entries.length > MAX_PREVIEW_ROWS ? `<span class="mini-ip-more">+${entries.length - MAX_PREVIEW_ROWS} gehiago - ireki guztiak ikusteko</span>` : ''}
    `;
  }
  const colNames = cols.map(c => escapeHtml(c.name)).join(', ');

  body.innerHTML = `
    <div class="node-head">
      <span class="node-name">${escapeHtml(node.name)}</span>
      <span class="node-ctrl">
        ${isAdmin() && node.node_type === 'agrupacion' ? '<button class="btn-text" data-action="edit">editatu</button>' : ''}
        ${isAdmin() ? '<button class="btn-text" data-action="delete">ezabatu</button>' : ''}
      </span>
    </div>
    ${node.description ? `<span class="node-desc">${escapeHtml(node.description)}</span>` : ''}
    ${node.node_type === 'rango' ? `<span class="node-cidr">${node.cidr}</span>` : ''}
    ${node.node_type === 'rango' && !entries.length && colNames ? `<span class="node-cols">Zutabeak: ${colNames}</span>` : ''}
    ${ipPreview}
  `;
  el.appendChild(body);

  let childrenBox = null;
  if (node.node_type === 'agrupacion') {
    childrenBox = document.createElement('div');
    childrenBox.className = 'node-children';
    childrenBox.style.display = (expandedGroups.has(node.id) || currentSearch.expandIds.has(node.id)) ? 'block' : 'none';
    node.children.forEach(child => childrenBox.appendChild(renderNode(child, site, role)));
    const addRow = document.createElement('div');
    addRow.className = 'node-add-row';
    addRow.appendChild(addButtons(node.id, site, role, refresh));
    childrenBox.appendChild(addRow);
    el.appendChild(childrenBox);

    if (isAdmin()) {
      body.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
        e.stopPropagation();
        const form = buildEditForm(node, async (changed) => { changed ? await refresh() : form.replaceWith(body); });
        body.replaceWith(form);
      });

      // soltar en el hueco vacío del área desplegada del grupo (no sobre
      // una tarjeta hija concreta) = añadir como último hijo de este grupo.
      // Para la propagación siempre: si no, el drop burbujearía hasta la
      // propia tarjeta del grupo y se ejecutarían las dos acciones a la vez.
      childrenBox.addEventListener('dragover', (e) => {
        if (!draggingNode || draggingNode.id === node.id) return;
        e.preventDefault();
        e.stopPropagation();
        childrenBox.classList.add('drop-target');
      });
      childrenBox.addEventListener('dragleave', (e) => {
        e.stopPropagation();
        childrenBox.classList.remove('drop-target');
      });
      childrenBox.addEventListener('drop', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        childrenBox.classList.remove('drop-target');
        if (!draggingNode || draggingNode.id === node.id) return;
        if (collectDescendantIds(draggingNode).has(node.id)) {
          alert('Ezin da talde bat bere ondorengo baten barruan utzi.');
          return;
        }
        await performMove({parent_id: node.id});
      });
    }
  }

  if (isAdmin()) {
    body.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNode(node);
    });
  }

  // arrastrar y soltar (solo admin): la tarjeta entera es arrastrable;
  // soltar SOBRE otra tarjeta la inserta justo delante de esa tarjeta
  // (reordena o cambia de sede/rol/grupo según donde esté esa tarjeta);
  // si es una agrupación, todo lo que tiene dentro se mueve con ella.
  if (isAdmin()) {
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      draggingNode = node;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(node.id));
    });
    el.addEventListener('dragend', (e) => {
      e.stopPropagation();
      el.classList.remove('dragging');
      draggingNode = null;
    });
    el.addEventListener('dragover', (e) => {
      if (!draggingNode || draggingNode.id === node.id) return;
      e.preventDefault();
      e.stopPropagation();
      el.classList.add('drop-target');
    });
    el.addEventListener('dragleave', (e) => {
      e.stopPropagation();
      el.classList.remove('drop-target');
    });
    el.addEventListener('drop', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drop-target');
      if (!draggingNode || draggingNode.id === node.id) return;
      if (collectDescendantIds(draggingNode).has(node.id)) {
        alert('Ezin da talde bat bere ondorengo baten gainean utzi.');
        return;
      }
      await performMove({parent_id: node.parent_id, site: node.site, role: node.role, before_id: node.id});
    });
  }

  // klika txartel osoan. Propagazioa beti geldiarazten da (txartel ume batek,
  // edo barruko edozein botoi/inputek - alta, edizioa... - ez dezan bere
  // agrupazio-edukiontziaren toggle-a ere eragin), baina ekintza nagusia
  // kontrol interaktibo batetik (botoi, input, select, formulario...) ez
  // datorren klikean bakarrik exekutatzen da.
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (e.target.closest('button, input, select, textarea, a, form')) return;
    if (node.node_type === 'rango') {
      openRangeModal(node.id);
    } else if (childrenBox) {
      const willShow = childrenBox.style.display === 'none';
      childrenBox.style.display = willShow ? 'block' : 'none';
      if (willShow) expandedGroups.add(node.id); else expandedGroups.delete(node.id);
    }
  });

  return el;
}

function renderGrid() {
  const table = document.getElementById('grid');
  table.innerHTML = '';

  const thead = document.createElement('tr');
  thead.appendChild(document.createElement('th'));
  for (const site of SITES) {
    const th = document.createElement('th'); th.textContent = site.label; thead.appendChild(th);
  }
  table.appendChild(thead);

  for (const role of ROLES) {
    const tr = document.createElement('tr');
    const th = document.createElement('th'); th.textContent = role.label; tr.appendChild(th);
    for (const site of SITES) {
      const td = document.createElement('td');
      (TREE[site.slug][role.slug] || []).forEach(node => td.appendChild(renderNode(node, site.slug, role.slug)));
      td.appendChild(addButtons(null, site.slug, role.slug, refresh));

      // soltar en el hueco vacío de la celda (no sobre una tarjeta
      // concreta) = pasar a primer nivel de esa sede/tipo de red
      if (isAdmin()) {
        td.addEventListener('dragover', (e) => {
          if (!draggingNode) return;
          e.preventDefault();
          td.classList.add('drop-target');
        });
        td.addEventListener('dragleave', () => td.classList.remove('drop-target'));
        td.addEventListener('drop', async (e) => {
          e.preventDefault();
          td.classList.remove('drop-target');
          if (!draggingNode) return;
          await performMove({parent_id: null, site: site.slug, role: role.slug});
        });
      }

      tr.appendChild(td);
    }
    table.appendChild(tr);
  }

  document.getElementById('status').style.display = 'none';
  table.style.display = 'table';
}

function findNodeById(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    const found = findNodeById(id, n.children);
    if (found) return found;
  }
  return null;
}

function allTopNodes() {
  const acc = [];
  for (const site of SITES) for (const role of ROLES) acc.push(...(TREE[site.slug][role.slug] || []));
  return acc;
}

function ipToInt(ip) {
  return ip.split('.').reduce((acc, o) => (acc << 8) + Number(o), 0) >>> 0;
}
function intToIp(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}
function hostsOf(cidr) {
  const [base, lenStr] = cidr.split('/');
  const len = parseInt(lenStr, 10);
  const hostBits = 32 - len;
  const baseInt = ipToInt(base);
  if (hostBits === 0) return [base];
  const size = Math.pow(2, hostBits);
  const networkInt = (baseInt >>> hostBits) * size >>> 0;
  const noReserved = hostBits <= 1; // /31: sarea/broadcast gorderik gabe (RFC 3021)
  const first = noReserved ? 0 : 1;
  const last = noReserved ? size - 1 : size - 2;
  const hosts = [];
  for (let i = first; i <= last; i++) hosts.push(intToIp((networkInt + i) >>> 0));
  return hosts;
}

const IP_TABLE_MAX_ROWS = 1024;

function renderIpTable(node) {
  const wrap = document.getElementById('ip-table-wrap');
  const cols = node.columns || [];
  if (!cols.length) {
    wrap.innerHTML = '<span class="node-desc">Gehitu gutxienez zutabe bat IP bakoitzeko datuak erregistratzeko.</span>';
    return;
  }

  const allHosts = hostsOf(node.cidr);
  const truncated = allHosts.length > IP_TABLE_MAX_ROWS;
  const hosts = truncated ? allHosts.slice(0, IP_TABLE_MAX_ROWS) : allHosts;

  const entryByIp = {};
  (node.ip_entries || []).forEach(e => { entryByIp[e.ip] = e; });

  wrap.innerHTML = '';
  if (truncated) {
    const note = document.createElement('p');
    note.className = 'node-desc';
    note.style.marginBottom = '6px';
    note.textContent = `Tarte oso handia: lehen ${IP_TABLE_MAX_ROWS} IPak erakusten dira ${allHosts.length}-tik.`;
    wrap.appendChild(note);
  }

  const table = document.createElement('table');
  table.className = 'ip-table';
  table.innerHTML = `
    <tr><th>IP</th>${cols.map(c => `<th>${escapeHtml(c.name)}</th>`).join('')}</tr>
    ${hosts.map(ip => {
      const entry = entryByIp[ip];
      const cells = cols.map(c => {
        const val = entry ? (entry.values[String(c.id)] || '') : '';
        return isAuthenticated
          ? `<td><input data-col="${c.id}" value="${escapeAttr(val)}"></td>`
          : `<td>${escapeHtml(val)}</td>`;
      }).join('');
      return `<tr data-ip="${ip}" class="${entry ? 'ip-row-used' : 'ip-row-free'}"><td>${ip}</td>${cells}</tr>`;
    }).join('')}
  `;
  wrap.appendChild(table);

  if (!isAuthenticated) return;

  table.querySelectorAll('input[data-col]').forEach(input => {
    input.addEventListener('blur', async () => {
      const tr = input.closest('tr');
      const ip = tr.dataset.ip;
      const columnId = Number(input.dataset.col);
      input.disabled = true;
      try {
        await api(`/nodes/${node.id}/ip-values`, {
          method: 'PUT',
          body: JSON.stringify({ip, column_id: columnId, value: input.value || null}),
        });
        input.title = '';
        input.style.outline = '';
        const stillHasData = [...tr.querySelectorAll('input[data-col]')].some(i => i.value.trim() !== '');
        tr.classList.toggle('ip-row-used', stillHasData);
        tr.classList.toggle('ip-row-free', !stillHasData);
        // memorian eguneratzen da modaletik kanpoko txartelaren ikuspegi
        // azkarra egunean egoteko, modala itxi edo birkargatu gabe
        loadAll();
      } catch (err) {
        input.title = err.message;
        input.style.outline = '2px solid #c23b4a';
      } finally {
        input.disabled = false;
      }
    });
  });
}

/* ---------- zutabeen katalogoaren modala ---------- */

async function openColumnsModal() {
  await renderColumnsModal();
  document.getElementById('columns-modal').showModal();
}

async function renderColumnsModal() {
  const body = document.getElementById('columns-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Zutabeak kudeatu</h2>
      <button class="btn-neutral" id="close-columns-modal">Itxi</button>
    </div>
    <div id="catalog-list">
      ${COLUMNS.map(c => `<div class="catalog-row"><span>${escapeHtml(c.name)}</span><button class="btn-text" data-col="${c.id}">ezabatu</button></div>`).join('') || '<span class="node-desc">Oraindik zutaberik ez.</span>'}
    </div>
    <form class="inline-form" id="new-column-form" style="margin-top:12px;">
      <input name="name" placeholder="Zutabearen izena (adib. Hostname, MAC...)" required>
      <button type="submit" class="btn-green">+ Zutabea sortu</button>
    </form>
    <div class="form-error" id="col-form-error"></div>
  `;
  document.getElementById('close-columns-modal').addEventListener('click', () => document.getElementById('columns-modal').close());

  body.querySelectorAll('#catalog-list button[data-col]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Zutabe hau katalogotik ezabatu? Erabiltzen duten tarte guztietatik kenduko da.')) return;
      await api(`/columns/${btn.dataset.col}`, {method: 'DELETE'});
      await afterCatalogChange();
    });
  });

  document.getElementById('new-column-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('col-form-error').textContent = '';
    try {
      await api('/columns', {method: 'POST', body: JSON.stringify({name: e.target.name.value})});
      await afterCatalogChange();
    } catch (err) {
      document.getElementById('col-form-error').textContent = err.message;
    }
  });
}

// katalogoko zutabe bat sortu/ezabatu ondoren, zerrenda hau eta atzean
// irekita dagoen tarte-modalaren desplegablea ere freskatzen dira
async function afterCatalogChange() {
  await refresh();
  await renderColumnsModal();
  if (currentRangeModalNodeId !== null) {
    await renderRangeModal(currentRangeModalNodeId);
  }
}

/* ---------- matrizearen modala (egoitzak eta sare motak) ---------- */

async function openMatrixModal() {
  await renderMatrixModal();
  document.getElementById('matrix-modal').showModal();
}

async function renderMatrixModal() {
  const body = document.getElementById('matrix-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Matrizea kudeatu</h2>
      <button class="btn-neutral" id="close-matrix-modal">Itxi</button>
    </div>
    <div class="modal-section">
      <h3>Egoitzak (zutabeak)</h3>
      <div id="site-list">
        ${SITES.map(s => `<div class="catalog-row"><span>${escapeHtml(s.label)}</span><button class="btn-text" data-kind="site" data-id="${s.id}">ezabatu</button></div>`).join('')}
      </div>
      <form class="inline-form" id="new-site-form">
        <input name="name" placeholder="Egoitzaren izena">
        <button type="submit" class="btn-green">+ Egoitza gehitu</button>
      </form>
      <div class="form-error" id="site-form-error"></div>
    </div>
    <div class="modal-section">
      <h3>Sare motak (errenkadak)</h3>
      <div id="role-list">
        ${ROLES.map(r => `<div class="catalog-row"><span>${escapeHtml(r.label)}</span><button class="btn-text" data-kind="role" data-id="${r.id}">ezabatu</button></div>`).join('')}
      </div>
      <form class="inline-form" id="new-role-form">
        <input name="name" placeholder="Sare motaren izena">
        <button type="submit" class="btn-green">+ Mota gehitu</button>
      </form>
      <div class="form-error" id="role-form-error"></div>
    </div>
  `;
  document.getElementById('close-matrix-modal').addEventListener('click', () => document.getElementById('matrix-modal').close());

  body.querySelectorAll('button[data-kind]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const endpoint = btn.dataset.kind === 'site' ? 'sites' : 'roles';
      if (!confirm('Ezabatu? Erabiltzen ari den ezer ez badago bakarrik ezaba daiteke.')) return;
      try {
        await api(`/${endpoint}/${btn.dataset.id}`, {method: 'DELETE'});
        await refresh();
        await renderMatrixModal();
      } catch (err) {
        alert(err.message);
      }
    });
  });

  document.getElementById('new-site-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('site-form-error').textContent = '';
    try {
      await api('/sites', {method: 'POST', body: JSON.stringify({name: e.target.name.value})});
      await refresh();
      await renderMatrixModal();
    } catch (err) {
      document.getElementById('site-form-error').textContent = err.message;
    }
  });

  document.getElementById('new-role-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('role-form-error').textContent = '';
    try {
      await api('/roles', {method: 'POST', body: JSON.stringify({name: e.target.name.value})});
      await refresh();
      await renderMatrixModal();
    } catch (err) {
      document.getElementById('role-form-error').textContent = err.message;
    }
  });
}

/* ---------- erabiltzaileen modala (admin/user rolak) ---------- */

async function openUsersModal() {
  await renderUsersModal();
  document.getElementById('users-modal').showModal();
}

async function renderUsersModal() {
  const body = document.getElementById('users-modal-body');
  const users = await api('/users');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Erabiltzaileak kudeatu</h2>
      <button class="btn-neutral" id="close-users-modal">Itxi</button>
    </div>
    <div class="modal-section">
      <div id="user-list">
        ${users.map(u => `
          <div class="catalog-row">
            <span>${escapeHtml(u.username)} <span class="node-desc" style="display:inline;">(${u.role === 'admin' ? 'administratzailea' : 'erabiltzailea'})</span></span>
            <button class="btn-text" data-id="${u.id}">ezabatu</button>
          </div>
        `).join('')}
      </div>
      <form class="inline-form" id="new-user-form" style="margin-top:12px;">
        <input name="username" placeholder="Erabiltzailea" required>
        <input name="password" type="password" placeholder="Hasierako pasahitza" required>
        <select name="role">
          <option value="user">Erabiltzailea (erregistroak bakarrik)</option>
          <option value="admin">Administratzailea (dena)</option>
        </select>
        <button type="submit" class="btn-green">+ Erabiltzailea sortu</button>
      </form>
      <div class="form-error" id="user-form-error"></div>
    </div>
  `;
  document.getElementById('close-users-modal').addEventListener('click', () => document.getElementById('users-modal').close());

  body.querySelectorAll('#user-list button[data-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Erabiltzaile hau ezabatu?')) return;
      try {
        await api(`/users/${btn.dataset.id}`, {method: 'DELETE'});
        await renderUsersModal();
      } catch (err) {
        alert(err.message);
      }
    });
  });

  document.getElementById('new-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('user-form-error').textContent = '';
    try {
      await api('/users', {method: 'POST', body: JSON.stringify({
        username: e.target.username.value, password: e.target.password.value, role: e.target.role.value,
      })});
      await renderUsersModal();
    } catch (err) {
      document.getElementById('user-form-error').textContent = err.message;
    }
  });
}

refresh().catch(err => {
  document.getElementById('status').textContent = `Errorea: ${err.message}`;
});
</script>
