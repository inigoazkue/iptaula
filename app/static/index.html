<!doctype html>
<html lang="eu">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IP Taula</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cg fill='none' stroke='%232c4562' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='4' r='2.6'/%3E%3Ccircle cx='4' cy='19' r='2.6'/%3E%3Ccircle cx='20' cy='19' r='2.6'/%3E%3Cpath d='M12 6.6L5.6 16.8M12 6.6l6.4 10.2M6.6 19h10.8'/%3E%3C/g%3E%3C/svg%3E">
<style>
  :root {
    color-scheme: light;
    --page:           #f6f5fb;
    --surface-1:      #ffffff;
    --text-primary:   #26243a;
    --text-secondary: #5c5975;
    --text-muted:     #8f8ca6;
    --gridline:       #e7e4f2;
    --border:         rgba(38,36,58,0.10);
    --shadow:         0 1px 3px rgba(38,36,58,0.08);

    --rango-bg:    #eaf2fd;
    --rango-border:#cfe2fa;
    --group-bg:    #fdf1e4;
    --group-border:#f3ddc0;

    --btn-blue:     #b7d3f7; --btn-blue-hover: #9cc0f2; --btn-blue-ink: #1d3f66;
    --btn-green:    #c8ecd3; --btn-green-hover: #aee0bd; --btn-green-ink: #205a34;
    --btn-pink:     #f8ccd2; --btn-pink-hover: #f3aeb8; --btn-pink-ink: #6e2430;
    --btn-neutral:  #eceafc; --btn-neutral-hover: #ddd9f7; --btn-neutral-ink: #33314a;

    --row-free: #eaf7ec;
    --row-used: #d3edfb;
    --search-match: #fff2a8;
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --page: #17161f; --surface-1: #211f2c;
      --text-primary: #f1f0f8; --text-secondary: #c2bfd6; --text-muted: #8f8ca6;
      --gridline: #322f42; --border: rgba(255,255,255,0.10);
      --shadow: 0 1px 3px rgba(0,0,0,0.4);
      --rango-bg: #1e2c3f; --rango-border: #2c4562;
      --group-bg: #362c1f; --group-border: #56412a;
      --btn-blue: #2c4562; --btn-blue-hover: #395a80; --btn-blue-ink: #cfe2fa;
      --btn-green: #23402c; --btn-green-hover: #2d5238; --btn-green-ink: #c8ecd3;
      --btn-pink: #4a2830; --btn-pink-hover: #5e323c; --btn-pink-ink: #f8ccd2;
      --btn-neutral: #2b2940; --btn-neutral-hover: #383552; --btn-neutral-ink: #eceafc;
      --row-free: #1d3320; --row-used: #1c3a4d; --search-match: #4a4420;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --page: #17161f; --surface-1: #211f2c;
    --text-primary: #f1f0f8; --text-secondary: #c2bfd6; --text-muted: #8f8ca6;
    --gridline: #322f42; --border: rgba(255,255,255,0.10);
    --shadow: 0 1px 3px rgba(0,0,0,0.4);
    --rango-bg: #1e2c3f; --rango-border: #2c4562;
    --group-bg: #362c1f; --group-border: #56412a;
    --btn-blue: #2c4562; --btn-blue-hover: #395a80; --btn-blue-ink: #cfe2fa;
    --btn-green: #23402c; --btn-green-hover: #2d5238; --btn-green-ink: #c8ecd3;
    --btn-pink: #4a2830; --btn-pink-hover: #5e323c; --btn-pink-ink: #f8ccd2;
    --btn-neutral: #2b2940; --btn-neutral-hover: #383552; --btn-neutral-ink: #eceafc;
    --row-free: #1d3320; --row-used: #1c3a4d; --search-match: #4a4420;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 24px;
    background: var(--page); color: var(--text-primary);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  h1 { font-size: 1.5rem; margin: 0 0 4px; }

  .topbar { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
  .topbar-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  button, .btn {
    font-family: inherit; cursor: pointer; border: none; border-radius: 8px;
    padding: 6px 12px; font-size: 0.78rem; font-weight: 600; margin: 0; vertical-align: middle;
    transition: background-color 150ms ease, transform 150ms ease, box-shadow 150ms ease;
  }
  button:hover, .btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
  .btn-blue    { background: var(--btn-blue); color: var(--btn-blue-ink); }
  .btn-blue:hover    { background: var(--btn-blue-hover); }
  .btn-green   { background: var(--btn-green); color: var(--btn-green-ink); }
  .btn-green:hover   { background: var(--btn-green-hover); }
  .btn-pink    { background: var(--btn-pink); color: var(--btn-pink-ink); }
  .btn-pink:hover    { background: var(--btn-pink-hover); }
  .btn-neutral { background: var(--btn-neutral); color: var(--btn-neutral-ink); }
  .btn-neutral:hover { background: var(--btn-neutral-hover); }
  .btn-text {
    background: none; color: var(--text-secondary); padding: 2px 4px; font-weight: 500;
    text-decoration: underline; text-decoration-color: transparent;
  }
  .btn-text:hover { color: var(--btn-blue-ink); text-decoration-color: currentColor; transform: none; box-shadow: none; }

  #dark-toggle-btn { display: flex; align-items: center; justify-content: center; padding: 6px 9px; }
  #dark-toggle-btn svg { width: 16px; height: 16px; display: block; }

  #undo-btn, #redo-btn, #modal-undo-btn, #modal-redo-btn, #delete-mode-btn {
    display: flex; align-items: center; justify-content: center; padding: 6px 9px;
  }
  #delete-mode-btn.armed { background: var(--btn-pink); color: var(--btn-pink-ink); }
  #delete-mode-btn svg { width: 16px; height: 16px; display: block; }
  #undo-btn svg, #redo-btn svg, #modal-undo-btn svg, #modal-redo-btn svg { width: 16px; height: 16px; display: block; }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
  .modal-header-actions { display: flex; gap: 6px; align-items: center; }

  #settings-btn {
    position: fixed; bottom: 22px; right: 22px; width: 46px; height: 46px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(38,36,58,0.22); z-index: 50;
  }
  #settings-btn svg { width: 22px; height: 22px; display: block; }
  #settings-menu {
    position: fixed; bottom: 78px; right: 22px; z-index: 51;
    background: var(--surface-1); border: 1px solid var(--border); border-radius: 10px;
    box-shadow: 0 8px 28px rgba(0,0,0,0.2); padding: 6px; min-width: 190px;
    display: none; flex-direction: column; gap: 2px;
  }
  #settings-menu.open { display: flex; }
  #settings-menu button {
    background: none; color: var(--text-primary); text-align: left; font-weight: 500;
    padding: 8px 10px; border-radius: 6px; width: 100%;
  }
  #settings-menu button:hover { background: var(--btn-neutral-hover); transform: none; box-shadow: none; }

  .title-row { display: flex; align-items: baseline; gap: 10px; }
  #version-badge {
    background: var(--surface-1); color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 3px 11px; font-size: 0.7rem; box-shadow: var(--shadow);
  }

  .search-row { margin-bottom: 14px; }
  .search-wrap { position: relative; display: inline-block; max-width: 100%; }
  #search-box {
    padding: 7px 30px 7px 12px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface-1); color: var(--text-primary); font-size: 0.82rem; width: 280px; max-width: 100%;
  }
  #search-clear-btn {
    position: absolute; right: 5px; top: 50%; transform: translateY(-50%);
    width: 20px; height: 20px; padding: 0; display: none; align-items: center; justify-content: center;
    background: none; color: var(--text-muted); border-radius: 50%; font-size: 0.9rem; line-height: 1;
  }
  #search-clear-btn:hover { background: var(--btn-neutral-hover); transform: translateY(-50%); box-shadow: none; }
  #search-clear-btn.show { display: flex; }

  .node-search-results { margin-top: 6px; border-top: 1px dashed var(--border); padding-top: 4px; }
  .node-search-results div { font-size: 0.72rem; font-family: ui-monospace, monospace; color: var(--text-secondary); }
  .node-search-results b { color: var(--text-primary); font-family: system-ui, sans-serif; }

  table { border-collapse: collapse; width: 100%; table-layout: fixed; }
  th, td {
    border: 1px solid var(--gridline); vertical-align: middle;
    padding: 10px; font-size: 0.85rem;
  }
  th {
    background: var(--surface-1); color: var(--text-secondary);
    font-weight: 700; text-align: left;
  }
  th:first-child { width: 130px; }
  .grid-scroll { overflow-x: auto; }
  .grid-scroll #grid { min-width: 640px; }

  .cell-actions {
    display: flex; gap: 8px; margin-bottom: 8px; min-height: 1px;
    opacity: 0; pointer-events: none; transition: opacity 150ms ease;
  }
  td:hover > .cell-actions, td:hover .cell-actions { opacity: 1; pointer-events: auto; }

  .node {
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 10px; margin-bottom: 8px; background: var(--surface-1);
    box-shadow: var(--shadow); cursor: pointer;
  }
  .node.rango { background: var(--rango-bg); border-color: var(--rango-border); }
  .node.agrupacion { background: var(--group-bg); border-color: var(--group-border); border-style: dashed; }
  .node.search-match { outline: 3px solid var(--search-match); outline-offset: 1px; }
  .node.dragging { opacity: 0.35; }
  /* zonas de soltado: arriba/abajo de una tarjeta = insertar como hermano
     antes/después; en medio de una agrupación (o su hueco vacío) = meter dentro */
  .node.drop-before { box-shadow: inset 0 3px 0 0 var(--link); }
  .node.drop-after  { box-shadow: inset 0 -3px 0 0 var(--link); }
  .node.drop-inside, td.drop-inside, .node-children.drop-inside {
    outline: 2px dashed var(--link); outline-offset: 2px; background: var(--btn-neutral-hover);
  }
  td.drop-inside, .node-children.drop-inside { outline-offset: -2px; border-radius: 6px; }
  .node-head { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
  .node-name { font-weight: 700; font-size: 0.88rem; }
  .node-desc { color: var(--text-secondary); font-size: 0.76rem; display: block; margin-top: 2px; }
  .node-cidr { color: var(--text-secondary); font-size: 0.78rem; font-family: ui-monospace, monospace; margin-top: 3px; }
  .node-ctrl { display: flex; gap: 8px; white-space: nowrap; }

  .node-children { margin: 8px 0 2px 14px; padding-left: 10px; border-left: 2px solid var(--gridline); cursor: default; }
  .node-add-row {
    display: flex; gap: 8px; margin-top: 6px; padding: 4px;
    opacity: 0; pointer-events: none; transition: opacity 150ms ease;
  }
  .node-children:hover .node-add-row { opacity: 1; pointer-events: auto; }

  form.inline-form {
    display: flex; flex-wrap: wrap; gap: 4px; margin: 6px 0;
    padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface-1);
  }
  form.inline-form input {
    font-size: 0.78rem; padding: 5px 7px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--page); color: var(--text-primary);
  }
  form.inline-form input[name="name"] { flex: 1; min-width: 100px; }
  form.inline-form input[name="cidr"] { width: 130px; }
  form.inline-form input[name="description"] { flex: 2; min-width: 120px; }
  .form-error { color: #c23b4a; font-size: 0.72rem; width: 100%; }
  .checkbox-label { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; }
  .checkbox-label input { width: auto; }

  /* --- modal --- */
  dialog {
    border: none; border-radius: 14px; padding: 0; width: min(720px, 92vw);
    background: var(--surface-1); color: var(--text-primary); box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  dialog::backdrop { background: rgba(20,18,30,0.45); }
  .modal-inner { padding: 20px 22px; max-height: 85vh; overflow-y: auto; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .modal-header h2 { font-size: 1.15rem; margin: 0; }
  .modal-section { margin-bottom: 18px; }
  .modal-section h3 { font-size: 0.85rem; color: var(--text-secondary); margin: 0 0 8px; text-transform: uppercase; letter-spacing: 0.04em; }
  .modal-section-compact { margin-bottom: 10px; }
  .modal-section-cols { display: flex; gap: 18px; align-items: flex-start; }
  .modal-col-left, .modal-col-right { flex: 1 1 0; min-width: 0; }
  .modal-col-left { border-right: 2px solid #000; padding-right: 18px; }
  .modal-col-left h3, .modal-col-right h3 { margin-bottom: 6px; }
  #active-columns-row select {
    font-size: 0.78rem; padding: 5px 9px; border: 1px solid var(--border);
    border-radius: 6px; background: var(--page); color: var(--text-primary);
  }
  .modal-col-left .inline-form, .modal-col-right.inline-form { margin: 0; }
  #active-columns-row { align-items: center; }
  #active-columns { display: flex; flex-wrap: wrap; gap: 0; }

  .col-chip {
    display: inline-flex; align-items: center; gap: 6px; font-size: 0.75rem;
    background: var(--btn-neutral); color: var(--btn-neutral-ink); padding: 3px 8px;
    border-radius: 10px; margin: 0 6px 6px 0;
  }
  .col-chip button { background: none; padding: 0; color: inherit; font-weight: 700; }

  table.ip-table th, table.ip-table td { font-size: 0.78rem; padding: 6px 8px; }
  table.ip-table input { width: 100%; font-size: 0.78rem; padding: 4px 6px; border: 1px solid var(--border); border-radius: 5px; background: var(--surface-1); color: var(--text-primary); }
  table.ip-table tr.ip-row-free  { background: var(--row-free); }
  table.ip-table tr.ip-row-used  { background: var(--row-used); }
  table.ip-table tr.ip-row-group { cursor: pointer; }
  table.ip-table tr.ip-row-group td { text-align: center; font-style: italic; color: var(--text-secondary); }
  table.ip-table tr.ip-row-group:hover td { color: var(--text-primary); }
  table.ip-table .ping-col { width: 26px; text-align: center; white-space: nowrap; }
  table.ip-table .resolve-col { width: 190px; }
  table.ip-table th.resolve-col, table.ip-table th.ping-col { text-align: center; }
  table.ip-table th.diag-group { text-align: center; }
  .header-action-btn { color: inherit; font-weight: 700; padding: 0; text-decoration-color: transparent; }
  .header-action-btn:hover { text-decoration-color: currentColor; color: var(--btn-blue-ink); }
  td.resolve-col.cell-with-btn { gap: 4px; }
  .resolve-result { flex: 1; font-size: 0.72rem; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  button.assign-arrow-btn {
    display: none; padding: 0 4px; background: none; color: var(--btn-blue-ink); font-weight: 700; flex: none;
  }
  button.assign-arrow-btn.show { display: inline-block; }
  button.assign-arrow-btn:hover { background: var(--btn-blue); transform: none; box-shadow: none; }
  .ip-filter-row { display: flex; gap: 6px; margin-bottom: 8px; }
  .ip-filter-row button { padding: 4px 10px; font-size: 0.75rem; }
  .ip-filter-row button.active { outline: 2px solid var(--btn-blue-ink); outline-offset: -2px; }
  button.ping-btn {
    width: 15px; height: 15px; border-radius: 50%; padding: 0; margin: 0 auto; display: block;
    border: 1px solid var(--border); background: var(--text-muted); opacity: 0.45; flex: none;
  }
  button.ping-btn:hover { transform: none; box-shadow: none; opacity: 0.8; }
  button.ping-btn.pinging     { background: #ec9a3c; opacity: 1; animation: ping-pulse 0.9s ease-in-out infinite; }
  button.ping-btn.ping-green  { background: #3fb56d; opacity: 1; }
  button.ping-btn.ping-orange { background: #ec9a3c; opacity: 1; }
  button.ping-btn.ping-blue   { background: #3d82c9; opacity: 1; }
  button.ping-btn.ping-red    { background: #d4514f; opacity: 1; }
  @keyframes ping-pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
  td.cell-with-btn { display: flex; align-items: center; gap: 6px; }
  td.cell-with-btn input, td.cell-with-btn span { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }

  .ip-col-toggle-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .col-toggle-btn { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; font-size: 0.72rem; }
  .col-toggle-btn svg { width: 12px; height: 12px; flex: none; }
  .col-toggle-btn.hidden-col { opacity: 0.5; }

  button.broom-btn {
    width: 20px; height: 20px; padding: 2px; display: flex; align-items: center; justify-content: center;
    border-radius: 6px; background: none; color: var(--text-muted);
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  }
  button.broom-btn svg { width: 14px; height: 14px; }
  button.broom-btn:hover { color: var(--btn-pink-ink); background: var(--btn-pink); transform: translate(-50%, -50%); box-shadow: none; }
  table.ip-table .broom-col { width: 26px; text-align: center; position: relative; }

  th.resizable-col { position: relative; }
  .col-resize-handle {
    position: absolute; top: 0; right: 0; bottom: 0; width: 7px; cursor: col-resize;
    touch-action: none;
  }
  .col-resize-handle:hover, .col-resize-handle.resizing { background: var(--btn-blue); }
  .ip-table-scroll { overflow-x: auto; }

  .catalog-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--gridline); font-size: 0.85rem; }
  .catalog-row:last-child { border-bottom: none; }

  /* --- modales de autenticación: más verticales/estrechos --- */
  #login-modal, #password-modal { width: min(320px, 90vw); }
  #login-modal .modal-header, #password-modal .modal-header { justify-content: center; position: relative; margin-bottom: 20px; }
  #login-modal .modal-header .btn-neutral, #password-modal .modal-header .btn-neutral {
    position: absolute; right: 0; top: 50%; transform: translateY(-50%); padding: 4px 9px;
  }
  #login-modal h2, #password-modal h2 { font-size: 1.05rem; }
  .auth-form { display: flex; flex-direction: column; gap: 12px; padding: 4px 2px 2px; }
  .auth-form input { width: 100%; padding: 10px 12px; font-size: 0.85rem; }
  .auth-form button[type="submit"] { padding: 10px; font-size: 0.85rem; margin-top: 4px; }

  #status { color: var(--text-muted); font-size: 0.85rem; }

  @media (max-width: 640px) {
    body { padding: 12px; }
    .topbar { flex-direction: column; align-items: flex-start; }
    .search-wrap, #search-box { width: 100%; }
    .modal-inner { padding: 14px 14px; }
    .modal-section-cols { flex-direction: column; gap: 12px; }
    .modal-col-left { border-right: none; padding-right: 0; }
    #settings-btn { bottom: 14px; right: 14px; }
    dialog { width: 96vw; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="title-row">
    <h1>IP Taula</h1>
    <div id="version-badge">v1.1.0</div>
  </div>
  <div class="topbar-right">
    <button class="btn-neutral" id="undo-btn" style="display:none;" title="Desegin" disabled></button>
    <button class="btn-neutral" id="redo-btn" style="display:none;" title="Berregin" disabled></button>
    <button class="btn-neutral" id="delete-mode-btn" style="display:none;" title="Ezabatzeko aukerak aktibatu"></button>
    <button class="btn-neutral" id="dark-toggle-btn" title="Modua aldatu"></button>
    <div id="auth-area"></div>
  </div>
</div>

<div class="search-row">
  <div class="search-wrap">
    <input type="text" id="search-box" placeholder="Bilatu IP, izena, hostname...">
    <button type="button" class="btn-neutral" id="search-clear-btn" title="Bilaketa hustu">×</button>
  </div>
</div>

<div id="status">Kargatzen...</div>
<div class="grid-scroll"><table id="grid" style="display:none;"></table></div>

<button id="settings-btn" class="btn-neutral" style="display:none;" title="Ezarpenak">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
</button>
<div id="settings-menu"></div>

<dialog id="range-modal"><div class="modal-inner" id="range-modal-body"></div></dialog>
<dialog id="columns-modal"><div class="modal-inner" id="columns-modal-body"></div></dialog>
<dialog id="matrix-modal"><div class="modal-inner" id="matrix-modal-body"></div></dialog>
<dialog id="users-modal"><div class="modal-inner" id="users-modal-body"></div></dialog>

let SITES = [];
let ROLES = [];

let COLUMNS = [];

let currentUsername = null;
let currentRole = null;
function isAdmin() { return isAuthenticated && currentRole === 'admin'; }
let deleteModeEnabled = false; // ezabatzeko botoiak ezkutuan hasten dira segurtasunagatik
function canDelete() { return isAdmin() && deleteModeEnabled; }
const expandedGroups = new Set(); // agrupazio zabalduen idak, errenderizazioen artean irauten du
let currentSearch = {matchedNodeIds: new Set(), expandIds: new Set(), ipMatches: new Map()};

async function api(path, opts) {
  const resp = await fetch(`/api${path}`, {headers: {'Content-Type': 'application/json'}, ...opts});
  if (!resp.ok) {
    const body = await resp.json().catch(() => ({}));
    throw new Error(body.detail || `HTTP ${resp.status}`);
  }
  return resp.status === 204 ? null : resp.json();
}

async function loadAll() {
  const [treeResp, cols, sess] = await Promise.all([api('/tree'), api('/columns'), api('/session')]);
  SITES = treeResp.sites.map(s => ({slug: s.slug, label: s.name, id: s.id}));
  ROLES = treeResp.roles.map(r => ({slug: r.slug, label: r.name, id: r.id}));
  TREE = treeResp.tree;
  COLUMNS = cols;
  isAuthenticated = sess.authenticated;
  currentUsername = sess.username || null;
  currentRole = sess.role || null;
}

async function refresh() {
  await loadAll();
  renderDeleteModeButton();
  renderGrid();
  renderAuthUI();
  renderSettingsButton();
  await renderHistoryButtons();
}

/* ---------- desegin / berregin ---------- */

async function renderHistoryButtons() {
  const undoBtn = document.getElementById('undo-btn');
  const redoBtn = document.getElementById('redo-btn');
  if (!isAuthenticated) {
    undoBtn.style.display = 'none';
    redoBtn.style.display = 'none';
    return;
  }
  undoBtn.style.display = 'flex';
  redoBtn.style.display = 'flex';
  const status = await api('/history-status');
  undoBtn.disabled = !status.can_undo;
  redoBtn.disabled = !status.can_redo;
  const modalUndoBtn = document.getElementById('modal-undo-btn');
  const modalRedoBtn = document.getElementById('modal-redo-btn');
  if (modalUndoBtn) modalUndoBtn.disabled = !status.can_undo;
  if (modalRedoBtn) modalRedoBtn.disabled = !status.can_redo;
}

async function performHistoryAction(path) {
  try {
    await api(path, {method: 'POST'});
    await refresh();
    if (currentRangeModalNodeId) {
      if (findNodeById(currentRangeModalNodeId, allTopNodes())) {
        await renderRangeModal(currentRangeModalNodeId);
      } else {
        document.getElementById('range-modal').close();
      }
    }
  } catch (err) {
    alert(err.message);
  }
}

document.getElementById('undo-btn').addEventListener('click', () => performHistoryAction('/undo'));
document.getElementById('redo-btn').addEventListener('click', () => performHistoryAction('/redo'));

function escapeAttr(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}
function escapeHtml(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
}

/* ---------- modu iluna/argia ---------- */

function systemPrefersDark() {
  return window.matchMedia('(prefers-color-scheme: dark)').matches;
}
function isEffectivelyDark() {
  const current = document.documentElement.getAttribute('data-theme');
  return current === 'dark' || (!current && systemPrefersDark());
}
function updateThemeButtonIcon() {
  // modu ilunean eguzkia erakusten da (argira aldatzeko gonbita), eta alderantziz
  document.getElementById('dark-toggle-btn').innerHTML = isEffectivelyDark() ? SUN_ICON : MOON_ICON;
}
function initTheme() {
  const saved = localStorage.getItem('iptaula-theme');
  if (saved) document.documentElement.setAttribute('data-theme', saved);
  updateThemeButtonIcon();
}
document.getElementById('dark-toggle-btn').addEventListener('click', () => {
  const next = isEffectivelyDark() ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('iptaula-theme', next);
  updateThemeButtonIcon();
});
initTheme();

/* ---------- modalak: kanpoan klik eginda itxi ---------- */

document.querySelectorAll('dialog').forEach(dialog => {
  dialog.addEventListener('click', (e) => {
    if (resizingColumn) return; // zutabe bat ensanchatzen ari zela solte du sagua, ez itxi
    if (e.target !== dialog) return; // barruko edukian klik, ez atzealdean
    const rect = dialog.getBoundingClientRect();
    const inside = e.clientY >= rect.top && e.clientY <= rect.bottom && e.clientX >= rect.left && e.clientX <= rect.right;
    if (!inside) dialog.close();
  });
});

/* ---------- autentifikazioa (saioa hasi/itxi, pasahitza aldatu) ---------- */

function renderAuthUI() {
  const authArea = document.getElementById('auth-area');
  if (isAuthenticated) {
    authArea.innerHTML = `
      <span style="font-size:0.78rem; color:var(--text-secondary); margin-right:2px;">${escapeHtml(currentUsername)}</span>
      <button class="btn-neutral" id="logout-btn">Itxi saioa</button>
    `;
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('/logout', {method: 'POST'});
      await refresh();
    });
  } else {
    authArea.innerHTML = `<button class="btn-blue" id="login-btn">Hasi saioa</button>`;
    document.getElementById('login-btn').addEventListener('click', () => openLoginModal());
  }
}

/* ---------- ezabatzeko modua (segurtasunagatik ezkutuan hasten da) ---------- */

function renderDeleteModeButton() {
  const btn = document.getElementById('delete-mode-btn');
  btn.style.display = isAdmin() ? 'flex' : 'none';
  if (!isAdmin()) deleteModeEnabled = false;
  btn.classList.toggle('armed', deleteModeEnabled);
  btn.innerHTML = deleteModeEnabled ? UNLOCK_ICON : LOCK_ICON;
  btn.title = deleteModeEnabled ? 'Ezabatzeko aukerak desaktibatu' : 'Ezabatzeko aukerak aktibatu';
}
document.getElementById('delete-mode-btn').addEventListener('click', () => {
  deleteModeEnabled = !deleteModeEnabled;
  renderDeleteModeButton();
  renderGrid();
});

/* ---------- ezarpen-botoia (engranajea) eta bere menua ---------- */

function renderSettingsButton() {
  const btn = document.getElementById('settings-btn');
  btn.style.display = isAuthenticated ? 'flex' : 'none';
  if (!isAuthenticated) closeSettingsMenu();
}

function closeSettingsMenu() {
  document.getElementById('settings-menu').classList.remove('open');
}

function renderSettingsMenu() {
  const menu = document.getElementById('settings-menu');
  const items = [];
  if (isAdmin()) {
    items.push({label: 'Taula orokorra kudeatu', action: () => openMatrixModal()});
    items.push({label: 'IP taulen zutabeak kudeatu', action: () => openColumnsModal()});
    items.push({label: 'Erabiltzaileak kudeatu', action: () => openUsersModal()});
  }
  items.push({label: 'Pasahitza aldatu', action: () => openPasswordModal()});

  menu.innerHTML = items.map((it, i) => `<button data-i="${i}">${it.label}</button>`).join('');
  menu.querySelectorAll('button').forEach((el, i) => {
    el.addEventListener('click', () => { closeSettingsMenu(); items[i].action(); });
  });
}

document.getElementById('settings-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  const menu = document.getElementById('settings-menu');
  if (menu.classList.contains('open')) { closeSettingsMenu(); return; }
  renderSettingsMenu();
  menu.classList.add('open');
});
document.addEventListener('click', (e) => {
  const menu = document.getElementById('settings-menu');
  if (menu.classList.contains('open') && !menu.contains(e.target) && e.target.id !== 'settings-btn') {
    closeSettingsMenu();
  }
});

/* ---------- bilaketa ---------- */

function computeSearch(query) {
  const q = query.trim().toLowerCase();
  const result = {matchedNodeIds: new Set(), expandIds: new Set(), ipMatches: new Map()};
  if (!q) return result;

  function visit(node, ancestors) {
    let selfMatch = node.name.toLowerCase().includes(q) || (node.description || '').toLowerCase().includes(q);
    if (node.node_type === 'rango') {
      if ((node.cidr || '').toLowerCase().includes(q)) selfMatch = true;
      const matchedIps = new Set();
      (node.ip_entries || []).forEach(e => {
        let ipMatch = e.ip.toLowerCase().includes(q);
        if (!ipMatch) {
          for (const val of Object.values(e.values)) {
            if (val && val.toLowerCase().includes(q)) { ipMatch = true; break; }
          }
        }
        if (ipMatch) matchedIps.add(e.ip);
      });
      if (matchedIps.size) {
        result.ipMatches.set(node.id, matchedIps);
        selfMatch = true;
      }
    }
    if (selfMatch) {
      result.matchedNodeIds.add(node.id);
      ancestors.forEach(a => result.expandIds.add(a));
    }
    if (node.node_type === 'agrupacion') {
      const childAncestors = [...ancestors, node.id];
      node.children.forEach(c => visit(c, childAncestors));
    }
  }

  for (const site of SITES) for (const role of ROLES) {
    (TREE[site.slug][role.slug] || []).forEach(n => visit(n, []));
  }
  return result;
}

let searchDebounce;
document.getElementById('search-box').addEventListener('input', (e) => {
  clearTimeout(searchDebounce);
  const query = e.target.value;
  document.getElementById('search-clear-btn').classList.toggle('show', query.length > 0);
  searchDebounce = setTimeout(() => {
    currentSearch = computeSearch(query);
    renderGrid();
  }, 200);
});
document.getElementById('search-clear-btn').addEventListener('click', () => {
  const box = document.getElementById('search-box');
  box.value = '';
  box.dispatchEvent(new Event('input'));
  box.focus();
});

/* ---------- nodoen alta/edizio formularioak ---------- */

function addButtons(parentId, site, role, onDone) {
  const wrap = document.createElement('div');
  wrap.className = 'cell-actions';
  if (!isAdmin()) return wrap;
  const addRango = document.createElement('button');
  addRango.className = 'btn-blue'; addRango.textContent = '+ tartea';
  const addGroup = document.createElement('button');
  addGroup.className = 'btn-neutral'; addGroup.textContent = '+ taldea';
  wrap.append(addRango, addGroup);
  addRango.addEventListener('click', () => wrap.replaceWith(buildForm('rango', parentId, site, role, onDone, () => wrap)));
  addGroup.addEventListener('click', () => wrap.replaceWith(buildForm('agrupacion', parentId, site, role, onDone, () => wrap)));
  return wrap;
}

function buildForm(nodeType, parentId, site, role, onDone, getOriginal) {
  const form = document.createElement('form');
  form.className = 'inline-form';
  form.innerHTML = `
    <input name="name" placeholder="Izena" required>
    ${nodeType === 'rango' ? '<input name="cidr" placeholder="10.1.2.0/24" required>' : ''}
    <input name="description" placeholder="Deskribapena (aukerakoa)">
    <button type="submit" class="btn-blue">Gorde</button>
    <button type="button" class="btn-neutral cancel">Utzi</button>
  `;
  form.querySelector('.cancel').addEventListener('click', () => form.replaceWith(getOriginal()));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    form.querySelectorAll('.form-error').forEach(el => el.remove());
    try {
      await api('/nodes', {
        method: 'POST',
        body: JSON.stringify({
          parent_id: parentId,
          site: parentId === null ? site : undefined,
          role: parentId === null ? role : undefined,
          node_type: nodeType,
          name: form.name.value,
          description: form.description.value || null,
          cidr: nodeType === 'rango' ? form.cidr.value : null,
        }),
      });
      await onDone();
    } catch (err) {
      const p = document.createElement('div');
      p.className = 'form-error'; p.textContent = err.message;
      form.appendChild(p);
    }
  });
  return form;
}

function buildEditForm(node, onDone) {
  const form = document.createElement('form');
  form.className = 'inline-form';
  form.innerHTML = `
    <input name="name" value="${escapeAttr(node.name)}" required>
    <input name="description" value="${escapeAttr(node.description || '')}" placeholder="Deskribapena (aukerakoa)">
    <button type="submit" class="btn-blue">Gorde</button>
    <button type="button" class="btn-neutral cancel">Utzi</button>
  `;
  form.querySelector('.cancel').addEventListener('click', () => onDone(false));
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    form.querySelectorAll('.form-error').forEach(el => el.remove());
    try {
      await api(`/nodes/${node.id}`, {
        method: 'PATCH',
        body: JSON.stringify({name: form.name.value, description: form.description.value || null}),
      });
      await onDone(true);
    } catch (err) {
      const p = document.createElement('div');
      p.className = 'form-error'; p.textContent = err.message;
      form.appendChild(p);
    }
  });
  return form;
}

function collectDescendantIds(node) {
  const acc = new Set();
  function walk(n) { n.children.forEach(c => { acc.add(c.id); walk(c); }); }
  walk(node);
  return acc;
}

// ---- arrastrar y soltar ----
// estado global mínimo del arrastre en curso (más simple y fiable entre
// navegadores que depender de dataTransfer.getData durante el dragover)
let draggingNode = null;

async function performMove(payload, onError) {
  try {
    await api(`/nodes/${draggingNode.id}/move`, {method: 'POST', body: JSON.stringify(payload)});
    await refresh();
  } catch (err) {
    if (onError) onError(err); else alert(err.message);
  }
}

function countDescendants(node) {
  return node.children.reduce((acc, c) => acc + 1 + countDescendants(c), 0);
}

async function deleteNode(node) {
  const n = countDescendants(node);
  const msg = n > 0 ? `"${node.name}" barruan ${n} elementu daude. Denak ezabatu?` : `"${node.name}" ezabatu?`;
  if (!confirm(msg)) return;
  await api(`/nodes/${node.id}`, {method: 'DELETE'});
  await refresh();
}

/* ---------- matrizeko nodo-txartela ---------- */

function renderNode(node, site, role, siblings) {
  const siblingIdx = siblings.findIndex(n => n.id === node.id);
  const nextSiblingId = siblingIdx >= 0 && siblingIdx < siblings.length - 1 ? siblings[siblingIdx + 1].id : null;

  const el = document.createElement('div');
  const isSearchMatch = currentSearch.matchedNodeIds.has(node.id);
  el.className = `node ${node.node_type}${isSearchMatch ? ' search-match' : ''}`;

  const body = document.createElement('div');

  const matchedIps = currentSearch.ipMatches.get(node.id);
  let searchResultsHtml = '';
  if (matchedIps && matchedIps.size) {
    const cols = node.columns || [];
    const matchedEntries = (node.ip_entries || []).filter(e => matchedIps.has(e.ip));
    searchResultsHtml = `<div class="node-search-results">${matchedEntries.map(e => {
      const vals = cols.map(c => e.values[String(c.id)]).filter(Boolean).join(', ');
      return `<div><b>${escapeHtml(e.ip)}</b>${vals ? ': ' + escapeHtml(vals) : ''}</div>`;
    }).join('')}</div>`;
  }

  body.innerHTML = `
    <div class="node-head">
      <span class="node-name">${escapeHtml(node.name)}</span>
      <span class="node-ctrl">
        ${isAdmin() && node.node_type === 'agrupacion' ? '<button class="btn-text" data-action="edit">editatu</button>' : ''}
        ${canDelete() ? '<button class="btn-text" data-action="delete">ezabatu</button>' : ''}
      </span>
    </div>
    ${node.description ? `<span class="node-desc">${escapeHtml(node.description)}</span>` : ''}
    ${node.node_type === 'rango' ? `<span class="node-cidr">${node.cidr}</span>` : ''}
    ${searchResultsHtml}
  `;
  el.appendChild(body);

  let childrenBox = null;
  if (node.node_type === 'agrupacion') {
    childrenBox = document.createElement('div');
    childrenBox.className = 'node-children';
    childrenBox.style.display = (expandedGroups.has(node.id) || currentSearch.expandIds.has(node.id)) ? 'block' : 'none';
    node.children.forEach(child => childrenBox.appendChild(renderNode(child, site, role, node.children)));
    const addRow = document.createElement('div');
    addRow.className = 'node-add-row';
    addRow.appendChild(addButtons(node.id, site, role, refresh));
    childrenBox.appendChild(addRow);
    el.appendChild(childrenBox);

    if (isAdmin()) {
      body.querySelector('[data-action="edit"]').addEventListener('click', (e) => {
        e.stopPropagation();
        const form = buildEditForm(node, async (changed) => { changed ? await refresh() : form.replaceWith(body); });
        body.replaceWith(form);
      });

      // soltar en el hueco vacío del área desplegada del grupo (no sobre
      // una tarjeta hija concreta) = añadir como último hijo de este grupo.
      // Para la propagación siempre: si no, el drop burbujearía hasta la
      // propia tarjeta del grupo y se ejecutarían las dos acciones a la vez.
      childrenBox.addEventListener('dragover', (e) => {
        if (!draggingNode || draggingNode.id === node.id) return;
        e.preventDefault();
        e.stopPropagation();
        childrenBox.classList.add('drop-inside');
      });
      childrenBox.addEventListener('dragleave', (e) => {
        e.stopPropagation();
        childrenBox.classList.remove('drop-inside');
      });
      childrenBox.addEventListener('drop', async (e) => {
        e.preventDefault();
        e.stopPropagation();
        childrenBox.classList.remove('drop-inside');
        if (!draggingNode || draggingNode.id === node.id) return;
        if (collectDescendantIds(draggingNode).has(node.id)) {
          alert('Ezin da talde bat bere ondorengo baten barruan utzi.');
          return;
        }
        await performMove({parent_id: node.id});
      });
    }
  }

  if (canDelete()) {
    body.querySelector('[data-action="delete"]').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteNode(node);
    });
  }

  // Arrastrar y soltar (solo admin): la tarjeta entera es arrastrable. Al
  // pasar por encima de otra tarjeta, la zona depende de dónde esté el
  // cursor verticalmente (sobre el "body", no sobre los hijos ya
  // desplegados, para que no varíe con la altura de un grupo abierto):
  //   - tercio superior -> insertar como hermano ANTES de esta tarjeta
  //   - tercio inferior -> insertar como hermano DESPUÉS
  //   - tercio central, solo si es una agrupación -> meter DENTRO de ella
  // (una agrupación, sin sitio para el tercio central, solo tiene antes/
  // después). Así se puede soltar dentro de un grupo sin necesidad de
  // desplegarlo antes. Si es una agrupación, todo lo que tiene dentro se
  // mueve con ella (lo hace el backend).
  if (isAdmin()) {
    el.draggable = true;
    el.addEventListener('dragstart', (e) => {
      e.stopPropagation();
      draggingNode = node;
      el.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(node.id));
    });
    el.addEventListener('dragend', (e) => {
      e.stopPropagation();
      el.classList.remove('dragging');
      draggingNode = null;
    });

    function dropZoneFor(e) {
      const rect = body.getBoundingClientRect();
      const ratio = (e.clientY - rect.top) / rect.height;
      if (node.node_type === 'agrupacion') {
        if (ratio < 1 / 3) return 'before';
        if (ratio > 2 / 3) return 'after';
        return 'inside';
      }
      return ratio < 0.5 ? 'before' : 'after';
    }

    el.addEventListener('dragover', (e) => {
      if (!draggingNode || draggingNode.id === node.id) return;
      if (collectDescendantIds(draggingNode).has(node.id)) return;
      e.preventDefault();
      e.stopPropagation();
      el.classList.remove('drop-before', 'drop-after', 'drop-inside');
      el.classList.add(`drop-${dropZoneFor(e)}`);
    });
    el.addEventListener('dragleave', (e) => {
      e.stopPropagation();
      el.classList.remove('drop-before', 'drop-after', 'drop-inside');
    });
    el.addEventListener('drop', async (e) => {
      e.preventDefault();
      e.stopPropagation();
      const zone = el.classList.contains('drop-inside') ? 'inside'
        : el.classList.contains('drop-after') ? 'after' : 'before';
      el.classList.remove('drop-before', 'drop-after', 'drop-inside');
      if (!draggingNode || draggingNode.id === node.id) return;
      if (collectDescendantIds(draggingNode).has(node.id)) {
        alert('Ezin da talde bat bere ondorengo baten gainean utzi.');
        return;
      }
      if (zone === 'inside') {
        await performMove({parent_id: node.id});
      } else if (zone === 'before') {
        await performMove({parent_id: node.parent_id, site: node.site, role: node.role, before_id: node.id});
      } else if (nextSiblingId) {
        await performMove({parent_id: node.parent_id, site: node.site, role: node.role, before_id: nextSiblingId});
      } else {
        await performMove({parent_id: node.parent_id, site: node.site, role: node.role});
      }
    });
  }

  // klika txartel osoan. Propagazioa beti geldiarazten da (txartel ume batek,
  // edo barruko edozein botoi/inputek - alta, edizioa... - ez dezan bere
  // agrupazio-edukiontziaren toggle-a ere eragin), baina ekintza nagusia
  // kontrol interaktibo batetik (botoi, input, select, formulario...) ez
  // datorren klikean bakarrik exekutatzen da.
  el.addEventListener('click', (e) => {
    e.stopPropagation();
    if (e.target.closest('button, input, select, textarea, a, form')) return;
    if (node.node_type === 'rango') {
      openRangeModal(node.id);
    } else if (childrenBox) {
      const willShow = childrenBox.style.display === 'none';
      childrenBox.style.display = willShow ? 'block' : 'none';
      if (willShow) expandedGroups.add(node.id); else expandedGroups.delete(node.id);
    }
  });

  return el;
}

function renderGrid() {
  const table = document.getElementById('grid');
  table.innerHTML = '';

  const thead = document.createElement('tr');
  thead.appendChild(document.createElement('th'));
  for (const site of SITES) {
    const th = document.createElement('th'); th.textContent = site.label; thead.appendChild(th);
  }
  table.appendChild(thead);

  for (const role of ROLES) {
    const tr = document.createElement('tr');
    const th = document.createElement('th'); th.textContent = role.label; tr.appendChild(th);
    for (const site of SITES) {
      const td = document.createElement('td');
      const cellNodes = TREE[site.slug][role.slug] || [];
      cellNodes.forEach(node => td.appendChild(renderNode(node, site.slug, role.slug, cellNodes)));
      td.appendChild(addButtons(null, site.slug, role.slug, refresh));

      // soltar en el hueco vacío de la celda (no sobre una tarjeta
      // concreta) = pasar a primer nivel de esa sede/tipo de red
      if (isAdmin()) {
        td.addEventListener('dragover', (e) => {
          if (!draggingNode) return;
          e.preventDefault();
          td.classList.add('drop-inside');
        });
        td.addEventListener('dragleave', () => td.classList.remove('drop-inside'));
        td.addEventListener('drop', async (e) => {
          e.preventDefault();
          td.classList.remove('drop-inside');
          if (!draggingNode) return;
          await performMove({parent_id: null, site: site.slug, role: role.slug});
        });
      }

      tr.appendChild(td);
    }
    table.appendChild(tr);
  }

  document.getElementById('status').style.display = 'none';
  table.style.display = 'table';
}

function findNodeById(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    const found = findNodeById(id, n.children);
    if (found) return found;
  }
  return null;
}

function allTopNodes() {
  const acc = [];
  for (const site of SITES) for (const role of ROLES) acc.push(...(TREE[site.slug][role.slug] || []));
  return acc;
}

function ipToInt(ip) {
  return ip.split('.').reduce((acc, o) => (acc << 8) + Number(o), 0) >>> 0;
}
function intToIp(n) {
  return [(n >>> 24) & 255, (n >>> 16) & 255, (n >>> 8) & 255, n & 255].join('.');
}
function hostsOf(cidr) {
  const [base, lenStr] = cidr.split('/');
  const len = parseInt(lenStr, 10);
  const hostBits = 32 - len;
  const baseInt = ipToInt(base);
  if (hostBits === 0) return [base];
  const size = Math.pow(2, hostBits);
  const networkInt = (baseInt >>> hostBits) * size >>> 0;
  const noReserved = hostBits <= 1; // /31: sarea/broadcast gorderik gabe (RFC 3021)
  const first = noReserved ? 0 : 1;
  const last = noReserved ? size - 1 : size - 2;
  const hosts = [];
  for (let i = first; i <= last; i++) hosts.push(intToIp((networkInt + i) >>> 0));
  return hosts;
}

const IP_TABLE_MAX_ROWS = 1024;

function pingTierClass(okCount) {
  if (okCount <= 0) return 'ping-red';
  if (okCount === 1) return 'ping-blue';
  if (okCount < 6) return 'ping-orange';
  return 'ping-green';
}

async function runPing(btn, ip) {
  ip = ip || btn.dataset.ip;
  if (!ip) return;
  btn.classList.remove('ping-red', 'ping-blue', 'ping-orange', 'ping-green');
  btn.classList.add('pinging');
  btn.disabled = true;
  try {
    const result = await api(`/ping/${ip}`);
    btn.classList.remove('pinging');
    btn.classList.add(pingTierClass(result.ok_count));
    btn.title = `${result.ok_count}/6 erantzun` + (result.ok_count === 0 && result.rejected ? ' (bidean ukatu dute)' : '');
  } catch (err) {
    btn.classList.remove('pinging');
    btn.classList.add('ping-red');
    btn.title = err.message;
  } finally {
    btn.disabled = false;
  }
}

async function runResolve(btn, ip, input, onSaved, resultSpan, assignBtn) {
  if (!ip) return;
  btn.classList.remove('ping-red', 'ping-green');
  btn.classList.add('pinging');
  btn.disabled = true;
  if (resultSpan) resultSpan.textContent = '';
  if (assignBtn) assignBtn.classList.remove('show');
  try {
    const result = await api(`/resolve/${ip}`);
    btn.classList.remove('pinging');
    if (result.found) {
      btn.classList.add('ping-green');
      const sourceNote = result.source === 'netbios' ? ' (NetBIOS bidez)' : '';
      btn.title = result.hostname + sourceNote;
      if (resultSpan) { resultSpan.textContent = result.hostname; resultSpan.title = result.hostname + sourceNote; }
      if (assignBtn) assignBtn.classList.add('show');
      if (input) {
        input.value = result.hostname;
        await onSaved(result.hostname);
      }
    } else {
      btn.classList.add('ping-red');
      btn.title = 'Ez da ebatzi';
      if (resultSpan) resultSpan.textContent = 'Ez da ebatzi';
    }
  } catch (err) {
    btn.classList.remove('pinging');
    btn.classList.add('ping-red');
    btn.title = err.message;
    if (resultSpan) resultSpan.textContent = err.message;
  } finally {
    btn.disabled = false;
  }
}

const MIN_FREE_RUN = 3; // gutxienez zenbat IP libre segidan behar diren taldean bildu eta tolesteko

let resizingColumn = false; // zutabe bat ensanchatzen ari denean, modala ez itxi kanpoan klik eginda

function buildHostRowEl(node, cols, ip, entry) {
  const tr = document.createElement('tr');
  tr.dataset.ip = ip;
  tr.className = entry ? 'ip-row-used' : 'ip-row-free';
  const broomCell = isAuthenticated
    ? `<td class="broom-col"><button type="button" class="broom-btn" title="Errenkada hutsik utzi (IPa askatu)">${X_ICON}</button></td>`
    : '';
  const pingCell = `<td class="ping-col"><button type="button" class="ping-btn" data-ip="${ip}" title="Ping egin"></button></td>`;
  const resolveCell = `<td class="resolve-col cell-with-btn">`
    + `<button type="button" class="ping-btn main-resolve-btn" title="Hostname-a ebatzi"></button>`
    + `<span class="resolve-result"></span>`
    + `<button type="button" class="assign-arrow-btn" title="Zutabe honen Hostname-ari esleitu">${ARROW_ICON}</button>`
    + `</td>`;
  const cells = cols.map(c => {
    const val = entry ? (entry.values[String(c.id)] || '') : '';
    const valueHtml = isAuthenticated
      ? `<input data-col="${c.id}" value="${escapeAttr(val)}">`
      : `<span title="${escapeAttr(val)}">${escapeHtml(val)}</span>`;
    if (c.is_ip) {
      return `<td class="cell-with-btn">${valueHtml}<button type="button" class="ping-btn col-ping-btn" title="Ping egin balio honi"></button></td>`;
    }
    if (c.is_hostname) {
      return `<td class="cell-with-btn">${valueHtml}<button type="button" class="ping-btn col-resolve-btn" title="Hostname-a ebatzi"></button></td>`;
    }
    return `<td>${valueHtml}</td>`;
  }).join('');
  tr.innerHTML = `${broomCell}<td>${ip}</td>${pingCell}${resolveCell}${cells}`;

  const pingBtn = tr.querySelector('button.ping-btn[data-ip]');
  if (pingBtn) pingBtn.addEventListener('click', () => runPing(pingBtn));

  async function saveValue(input) {
    const columnId = Number(input.dataset.col);
    await api(`/nodes/${node.id}/ip-values`, {
      method: 'PUT',
      body: JSON.stringify({ip, column_id: columnId, value: input.value || null}),
    });
    const stillHasData = [...tr.querySelectorAll('input[data-col]')].some(i => i.value.trim() !== '');
    tr.classList.toggle('ip-row-used', stillHasData);
    tr.classList.toggle('ip-row-free', !stillHasData);
    // memorian eguneratzen da modaletik kanpoko txartelaren ikuspegi
    // azkarra egunean egoteko, modala itxi edo birkargatu gabe
    loadAll();
  }

  const mainResolveBtn = tr.querySelector('button.main-resolve-btn');
  if (mainResolveBtn) {
    const resultSpan = tr.querySelector('td.resolve-col .resolve-result');
    const assignBtn = tr.querySelector('td.resolve-col .assign-arrow-btn');
    // Hostname izeneko zutabea aurkitzen bada errenkada honetan, geziak
    // ebatzitako izena zuzenean zutabe horri esleitzen dio
    const hostnameCol = cols.find(c => c.name.toLowerCase() === 'hostname');
    const hostnameInput = hostnameCol ? tr.querySelector(`input[data-col="${hostnameCol.id}"]`) : null;
    if (!hostnameInput) assignBtn.style.display = 'none';
    mainResolveBtn.addEventListener('click', () => runResolve(mainResolveBtn, ip, null, null, resultSpan, assignBtn));
    if (hostnameInput) {
      assignBtn.addEventListener('click', async () => {
        hostnameInput.value = resultSpan.textContent;
        await saveValue(hostnameInput);
      });
    }
  }

  tr.querySelectorAll('td.cell-with-btn:not(.resolve-col)').forEach(td => {
    const input = td.querySelector('input');
    const span = td.querySelector('span');
    const colPingBtn = td.querySelector('.col-ping-btn');
    if (colPingBtn) {
      colPingBtn.addEventListener('click', () => runPing(colPingBtn, (input ? input.value : span.textContent).trim()));
    }
    const colResolveBtn = td.querySelector('.col-resolve-btn');
    if (colResolveBtn) {
      colResolveBtn.addEventListener('click', () => runResolve(colResolveBtn, ip, input, input ? () => saveValue(input) : null));
    }
  });

  if (!isAuthenticated) return tr;

  const broomBtn = tr.querySelector('button.broom-btn');
  if (broomBtn) {
    broomBtn.addEventListener('click', async () => {
      if (!tr.classList.contains('ip-row-used')) return;
      broomBtn.disabled = true;
      try {
        for (const input of tr.querySelectorAll('input[data-col]')) {
          if (input.value.trim() !== '') {
            await api(`/nodes/${node.id}/ip-values`, {
              method: 'PUT',
              body: JSON.stringify({ip, column_id: Number(input.dataset.col), value: null}),
            });
            input.value = '';
          }
        }
        tr.classList.remove('ip-row-used');
        tr.classList.add('ip-row-free');
        loadAll();
      } catch (err) {
        alert(err.message);
      } finally {
        broomBtn.disabled = false;
      }
    });
  }

  tr.querySelectorAll('input[data-col]').forEach(input => {
    input.addEventListener('blur', async () => {
      input.disabled = true;
      try {
        await saveValue(input);
        input.title = '';
        input.style.outline = '';
      } catch (err) {
        input.title = err.message;
        input.style.outline = '2px solid #c23b4a';
      } finally {
        input.disabled = false;
      }
    });
  });
  return tr;
}

function buildFreeGroupRowEl(node, cols, groupHosts, totalCols) {
  const tr = document.createElement('tr');
  tr.className = 'ip-row-free ip-row-group';

  td.colSpan = totalCols;
  const first = groupHosts[0], last = groupHosts[groupHosts.length - 1];
  td.textContent = `${groupHosts.length} IP libre (${first} - ${last}) — klikatu zabaltzeko`;

    const frag = document.createDocumentFragment();
    groupHosts.forEach(ip => frag.appendChild(buildHostRowEl(node, cols, ip, null)));

  return tr;
}

let hiddenColumns = new Set();

function renderIpTable(node) {
  const wrap = document.getElementById('ip-table-wrap');
  const allCols = node.columns || [];
  if (!allCols.length) {
    wrap.innerHTML = '<span class="node-desc">Gehitu gutxienez zutabe bat IP bakoitzeko datuak erregistratzeko.</span>';
    return;
  }

  const allHosts = hostsOf(node.cidr);
  const truncated = allHosts.length > IP_TABLE_MAX_ROWS;
  const hosts = truncated ? allHosts.slice(0, IP_TABLE_MAX_ROWS) : allHosts;

  const entryByIp = {};
  (node.ip_entries || []).forEach(e => { entryByIp[e.ip] = e; });

  wrap.innerHTML = '';

  if (allCols.length > 1) {
    const colToggleRow = document.createElement('div');
    colToggleRow.className = 'ip-col-toggle-row';
    colToggleRow.innerHTML = allCols.map(c => {
      const hidden = hiddenColumns.has(c.id);
      return `<button type="button" class="btn-neutral col-toggle-btn${hidden ? ' hidden-col' : ''}" data-col-id="${c.id}" title="${hidden ? 'Zutabea erakutsi' : 'Zutabea ezkutatu'}">${hidden ? EYE_OFF_ICON : EYE_ICON} ${escapeHtml(c.name)}</button>`;
    }).join('');
    colToggleRow.querySelectorAll('button[data-col-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = Number(btn.dataset.colId);
        if (hiddenColumns.has(id)) hiddenColumns.delete(id); else hiddenColumns.add(id);
        renderIpTable(node);
      });
    });
    wrap.appendChild(colToggleRow);
  }

  const cols = allCols.filter(c => !hiddenColumns.has(c.id));

  const filterRow = document.createElement('div');
  filterRow.className = 'ip-filter-row';
  const FILTERS = [['all', 'Guztiak'], ['used', 'Erabilita'], ['free', 'Libre']];
  filterRow.innerHTML = FILTERS.map(([key, label]) =>
    `<button type="button" class="btn-neutral${ipTableFilter === key ? ' active' : ''}" data-filter="${key}">${label}</button>`
  ).join('');
  filterRow.querySelectorAll('button[data-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      ipTableFilter = btn.dataset.filter;
      renderIpTable(node);
    });
  });
  wrap.appendChild(filterRow);

  if (truncated) {
    const note = document.createElement('p');
    note.className = 'node-desc';
    note.style.marginBottom = '6px';
    note.textContent = `Tarte oso handia: lehen ${IP_TABLE_MAX_ROWS} IPak erakusten dira ${allHosts.length}-tik.`;
    wrap.appendChild(note);
  }

  if (!cols.length) {
    wrap.appendChild(Object.assign(document.createElement('p'), {
      className: 'node-desc', textContent: 'Zutabe guztiak ezkutatuta daude.',
    }));
    return;
  }

  const scrollWrap = document.createElement('div');
  scrollWrap.className = 'ip-table-scroll';
  const table = document.createElement('table');
  table.className = 'ip-table';
  const totalCols = 2 + (isAuthenticated ? 1 : 0) + cols.length;

  const groupTr = document.createElement('tr');
  groupTr.innerHTML = `${isAuthenticated ? '<th class="broom-col" rowspan="2"></th>' : ''}<th rowspan="2">IP</th><th class="diag-group" colspan="2">IP honen diagnostikoa</th>`;
  // las columnas de datos ocupan las dos filas de cabecera (rowspan) para no partir su titulo
  cols.forEach((c) => {
    const th = document.createElement('th');
    th.rowSpan = 2;
    th.className = 'resizable-col';
    th.textContent = c.name;
    th.appendChild(Object.assign(document.createElement('div'), {className: 'col-resize-handle'}));
    groupTr.appendChild(th);
  });
  table.appendChild(groupTr);

  const headTr = document.createElement('tr');
  headTr.innerHTML = `<th class="ping-col"><button type="button" class="btn-text header-action-btn" id="ping-all-btn" title="Errenkada guztiei (libre eta erabilita) ping egin">Ping</button></th>`
    + `<th class="resolve-col"><button type="button" class="btn-text header-action-btn" id="resolve-all-btn" title="Errenkada guztien (libre eta erabilita) Hostname-a ebatzi">Host.Res.</button></th>`;
  table.appendChild(headTr);

  function expandAllFreeGroups() {
    wrap.querySelectorAll('tr.ip-row-group').forEach(groupRow => groupRow.click());
  }

  headTr.querySelector('#ping-all-btn').addEventListener('click', async () => {
    expandAllFreeGroups();
    const btns = [...wrap.querySelectorAll('button.ping-btn[data-ip]')];
    if (!btns.length) return;
    if (btns.length > 60 && !confirm(`${btns.length} IPri ping egingo zaie, denbora har dezake. Jarraitu?`)) return;
    await Promise.all(btns.map(b => runPing(b)));
  });

  headTr.querySelector('#resolve-all-btn').addEventListener('click', async () => {
    expandAllFreeGroups();
    const items = [...wrap.querySelectorAll('tr[data-ip]')]
      .map(rowEl => ({
        btn: rowEl.querySelector('button.main-resolve-btn'),
        ip: rowEl.dataset.ip,
        resultSpan: rowEl.querySelector('td.resolve-col .resolve-result'),
        assignBtn: rowEl.querySelector('td.resolve-col .assign-arrow-btn'),
      }))
      .filter(x => x.btn);
    if (!items.length) return;
    if (items.length > 60 && !confirm(`${items.length} IPren Hostname-a ebatziko da, denbora har dezake. Jarraitu?`)) return;
    await Promise.all(items.map(x => runResolve(x.btn, x.ip, null, null, x.resultSpan, x.assignBtn)));
  });

  table.querySelectorAll('.col-resize-handle').forEach(handle => {
    handle.addEventListener('mousedown', (e) => {
      e.preventDefault();
      const th = handle.parentElement;
      const dialog = document.getElementById('range-modal');
      handle.classList.add('resizing');
      resizingColumn = true;
      const startX = e.clientX;
      const startWidth = th.offsetWidth;
      const startDialogWidth = dialog.offsetWidth;
      function onMove(ev) {
        const delta = ev.clientX - startX;
        th.style.width = Math.max(50, startWidth + delta) + 'px';
        // modala bera ere zabaldu, bestela zutabe bat zabaltzeak besteak estutzen ditu
        if (delta > 0) {
          dialog.style.width = Math.min(window.innerWidth * 0.95, startDialogWidth + delta) + 'px';
        }
      }
      function onUp() {
        handle.classList.remove('resizing');
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        setTimeout(() => { resizingColumn = false; }, 0);
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  let i = 0;
  while (i < hosts.length) {
    const ip = hosts[i];
    const entry = entryByIp[ip];

    if (entry) {
      if (ipTableFilter !== 'free') table.appendChild(buildHostRowEl(node, cols, ip, entry));
      i++;
      continue;
    }

    let j = i;
    while (j < hosts.length && !entryByIp[hosts[j]]) j++;
    const run = hosts.slice(i, j);
    if (ipTableFilter !== 'used') {
      if (run.length >= MIN_FREE_RUN) {
        table.appendChild(buildFreeGroupRowEl(node, cols, run, totalCols));
      } else {
        run.forEach(freeIp => table.appendChild(buildHostRowEl(node, cols, freeIp, null)));
      }
    }
    i = j;
  }
  scrollWrap.appendChild(table);
  wrap.appendChild(scrollWrap);
}

/* ---------- zutabeen katalogoaren modala ---------- */

async function openColumnsModal() {
  await renderColumnsModal();
  document.getElementById('columns-modal').showModal();
}

async function renderColumnsModal() {
  const body = document.getElementById('columns-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>IP taulen zutabeak kudeatu</h2>
      <button class="btn-neutral" id="close-columns-modal">Itxi</button>
    </div>
    <div id="catalog-list">
      ${COLUMNS.map(c => `<div class="catalog-row"><span>${escapeHtml(c.name)}${c.is_ip ? ' <span class="col-chip" style="margin:0;">Ping</span>' : ''}${c.is_hostname ? ' <span class="col-chip" style="margin:0;">Hostname</span>' : ''}</span><button class="btn-text" data-col="${c.id}">ezabatu</button></div>`).join('') || '<span class="node-desc">Oraindik zutaberik ez.</span>'}
    </div>
    <form class="inline-form" id="new-column-form" style="margin-top:12px;">
      <input name="name" placeholder="Zutabearen izena (adib. Hostname, MAC...)" required>
      <label class="checkbox-label">
        <input type="checkbox" name="is_ip"> IP zutabea (ping-a gaitu)
      </label>
      <label class="checkbox-label">
        <input type="checkbox" name="is_hostname"> Hostname zutabea (ebazgarria)
      </label>
      <button type="submit" class="btn-green">+ Zutabea sortu</button>
    </form>
    <div class="form-error" id="col-form-error"></div>
  `;
  document.getElementById('close-columns-modal').addEventListener('click', () => document.getElementById('columns-modal').close());

  body.querySelectorAll('#catalog-list button[data-col]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Zutabe hau katalogotik ezabatu? Erabiltzen duten tarte guztietatik kenduko da.')) return;
      await api(`/columns/${btn.dataset.col}`, {method: 'DELETE'});
      await afterCatalogChange();
    });
  });

  document.getElementById('new-column-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('col-form-error').textContent = '';
    try {
      await api('/columns', {method: 'POST', body: JSON.stringify({
        name: e.target.name.value, is_ip: e.target.is_ip.checked, is_hostname: e.target.is_hostname.checked,
      })});
      await afterCatalogChange();
    } catch (err) {
      document.getElementById('col-form-error').textContent = err.message;
    }
  });
}

// katalogoko zutabe bat sortu/ezabatu ondoren, zerrenda hau eta atzean
// irekita dagoen tarte-modalaren desplegablea ere freskatzen dira
async function afterCatalogChange() {
  await refresh();
  await renderColumnsModal();
  if (currentRangeModalNodeId !== null) {
    await renderRangeModal(currentRangeModalNodeId);
  }
}

/* ---------- matrizearen modala (egoitzak eta sare motak) ---------- */

async function openMatrixModal() {
  await renderMatrixModal();
  document.getElementById('matrix-modal').showModal();
}

async function renderMatrixModal() {
  const body = document.getElementById('matrix-modal-body');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Taula orokorra kudeatu</h2>
      <button class="btn-neutral" id="close-matrix-modal">Itxi</button>
    </div>
    <div class="modal-section">
      <h3>Egoitzak (zutabeak)</h3>
      <div id="site-list">
        ${SITES.map(s => `<div class="catalog-row"><span>${escapeHtml(s.label)}</span><button class="btn-text" data-kind="site" data-id="${s.id}">ezabatu</button></div>`).join('')}
      </div>
      <form class="inline-form" id="new-site-form">
        <input name="name" placeholder="Egoitzaren izena">
        <button type="submit" class="btn-green">+ Egoitza gehitu</button>
      </form>
      <div class="form-error" id="site-form-error"></div>
    </div>
    <div class="modal-section">
      <h3>Sare motak (errenkadak)</h3>
      <div id="role-list">
        ${ROLES.map(r => `<div class="catalog-row"><span>${escapeHtml(r.label)}</span><button class="btn-text" data-kind="role" data-id="${r.id}">ezabatu</button></div>`).join('')}
      </div>
      <form class="inline-form" id="new-role-form">
        <input name="name" placeholder="Sare motaren izena">
        <button type="submit" class="btn-green">+ Mota gehitu</button>
      </form>
      <div class="form-error" id="role-form-error"></div>
    </div>
  `;
  document.getElementById('close-matrix-modal').addEventListener('click', () => document.getElementById('matrix-modal').close());

  body.querySelectorAll('button[data-kind]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const endpoint = btn.dataset.kind === 'site' ? 'sites' : 'roles';
      if (!confirm('Ezabatu? Erabiltzen ari den ezer ez badago bakarrik ezaba daiteke.')) return;
      try {
        await api(`/${endpoint}/${btn.dataset.id}`, {method: 'DELETE'});
        await refresh();
        await renderMatrixModal();
      } catch (err) {
        alert(err.message);
      }
    });
  });

  document.getElementById('new-site-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('site-form-error').textContent = '';
    try {
      await api('/sites', {method: 'POST', body: JSON.stringify({name: e.target.name.value})});
      await refresh();
      await renderMatrixModal();
    } catch (err) {
      document.getElementById('site-form-error').textContent = err.message;
    }
  });

  document.getElementById('new-role-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('role-form-error').textContent = '';
    try {
      await api('/roles', {method: 'POST', body: JSON.stringify({name: e.target.name.value})});
      await refresh();
      await renderMatrixModal();
    } catch (err) {
      document.getElementById('role-form-error').textContent = err.message;
    }
  });
}

/* ---------- erabiltzaileen modala (admin/user rolak) ---------- */

async function openUsersModal() {
  await renderUsersModal();
  document.getElementById('users-modal').showModal();
}

async function renderUsersModal() {
  const body = document.getElementById('users-modal-body');
  const users = await api('/users');
  body.innerHTML = `
    <div class="modal-header">
      <h2>Erabiltzaileak kudeatu</h2>
      <button class="btn-neutral" id="close-users-modal">Itxi</button>
    </div>
    <div class="modal-section">
      <div id="user-list">
        ${users.map(u => `
          <div class="catalog-row">
            <span>${escapeHtml(u.username)} <span class="node-desc" style="display:inline;">(${u.role === 'admin' ? 'administratzailea' : 'erabiltzailea'})</span></span>
            <button class="btn-text" data-id="${u.id}">ezabatu</button>
          </div>
        `).join('')}
      </div>
      <form class="inline-form" id="new-user-form" style="margin-top:12px;">
        <input name="username" placeholder="Erabiltzailea" required>
        <input name="password" type="password" placeholder="Hasierako pasahitza" required>
        <select name="role">
          <option value="user">Erabiltzailea (erregistroak bakarrik)</option>
          <option value="admin">Administratzailea (dena)</option>
        </select>
        <button type="submit" class="btn-green">+ Erabiltzailea sortu</button>
      </form>
      <div class="form-error" id="user-form-error"></div>
    </div>
  `;
  document.getElementById('close-users-modal').addEventListener('click', () => document.getElementById('users-modal').close());

  body.querySelectorAll('#user-list button[data-id]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (!confirm('Erabiltzaile hau ezabatu?')) return;
      try {
        await api(`/users/${btn.dataset.id}`, {method: 'DELETE'});
        await renderUsersModal();
      } catch (err) {
        alert(err.message);
      }
    });
  });

  document.getElementById('new-user-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    document.getElementById('user-form-error').textContent = '';
    try {
      await api('/users', {method: 'POST', body: JSON.stringify({
        username: e.target.username.value, password: e.target.password.value, role: e.target.role.value,
      })});
      await renderUsersModal();
    } catch (err) {
      document.getElementById('user-form-error').textContent = err.message;
    }
  });
}

refresh().catch(err => {
  document.getElementById('status').textContent = `Errorea: ${err.message}`;
});
